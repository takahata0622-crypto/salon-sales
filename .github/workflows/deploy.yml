name: Firebase Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Set version to deploy date (JST)
        run: |
          VERSION=$(TZ=Asia/Tokyo date +'%Y.%m.%d')
          sed -i "s/Ver [0-9.]\+/Ver $VERSION/" public/index.html

      - name: Deploy to Firebase Hosting and Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting,firestore:rules
