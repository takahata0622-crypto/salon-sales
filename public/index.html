<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サロン売上管理</title>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #F7F3EE;
      --card: #FFFFFF;
      --ink: #1A1714;
      --accent: #9B6A4A;
      --accent-light: #F3EAE0;
      --muted: #8A7F76;
      --border: #E5DDD5;
      --danger: #C0392B;
      --success: #2E7D5E;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header .version {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logout-btn {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
    }

    .user-line {
      padding: 8px 20px 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    /* ログイン画面 */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .login-card h1 {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }

    .login-mode {
      display: flex;
      gap: 0;
      margin-bottom: 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .login-mode button {
      flex: 1;
      padding: 9px;
      font-size: 14px;
      font-weight: 600;
      background: var(--bg);
      color: var(--muted);
      border: none;
      cursor: pointer;
    }

    .login-mode button.active {
      background: var(--accent);
      color: white;
    }

    .login-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 15px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    .login-input:focus {
      border-color: var(--accent);
    }

    .login-error {
      background: rgba(220,53,69,0.1);
      color: var(--danger);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .login-submit {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .login-submit:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .login-hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      gap: 0;
      background: var(--accent-light);
      border-radius: 10px;
      padding: 3px;
      margin: 16px 16px 0;
    }

    .tab {
      flex: 1;
      padding: 8px 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      background: none;
      border: none;
    }

    .tab.active {
      background: var(--card);
      color: var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .main { padding: 16px; }

    /* 今日の売上 */
    .today-total {
      background: var(--accent);
      color: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }

    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .date-nav button {
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 8px;
      color: white;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .date-nav button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .date-nav .date-label {
      font-size: 14px;
      font-weight: 700;
      min-width: 140px;
    }

    .today-total .label {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .today-total .amount {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .today-total .count {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 4px;
    }

    .today-total .discount-line {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 6px;
      background: rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 4px 8px;
      display: inline-block;
    }

    /* 内訳ヘッダ・宿泊割引トグル */
    .entry-list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .entry-list-head h2 {
      padding: 0;
      border: none;
    }

    .toggle-btns { display: flex; gap: 8px; }

    .toggle-btn {
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn.active {
      color: white;
      background: var(--accent);
      border-color: var(--accent);
    }

    .day-discount { color: var(--danger); font-weight: 600; }
    .day-discount .de-price { color: var(--danger); }

    /* コース追加 */
    .add-section {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .add-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .add-section-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .add-section-header .dept-tabs {
      border-bottom: none;
      margin-bottom: 0;
      flex: 0;
      gap: 6px;
    }

    .add-section-header .dept-tab {
      border-radius: 20px;
      border: 1px solid var(--border) !important;
      margin-bottom: 0;
      padding: 4px 14px;
      font-size: 13px;
      line-height: 1.4;
      white-space: nowrap;
    }

    .add-section-header .dept-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent) !important;
      box-shadow: none;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .preset-btn {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-btn:active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .preset-btn .course-name {
      font-size: 13px;
      font-weight: 600;
      display: block;
    }

    .preset-btn .course-price {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      display: block;
    }

    .preset-btn:active .course-price {
      color: rgba(255,255,255,0.8);
    }

    /* カスタム入力 */
    .custom-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .custom-input-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
    }

    .custom-input-row input:focus {
      border-color: var(--accent);
    }

    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    /* 今日のリスト */
    .entry-list {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .entry-list h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .entry-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .entry-item:last-child { border-bottom: none; }

    .entry-memo {
      width: 100%;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      box-sizing: border-box;
    }

    .entry-memo:focus {
      border-color: var(--accent);
    }

    .entry-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .entry-toggles {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .entry-orig {
      font-size: 12px;
      color: var(--muted);
      text-decoration: line-through;
    }

    .entry-disc-note {
      font-size: 11px;
      font-weight: 700;
      color: var(--danger);
    }

    .toggle-btn.sm {
      padding: 4px 12px;
      font-size: 12px;
      border-radius: 16px;
    }

    .entry-info .entry-name {
      font-size: 14px;
      font-weight: 500;
    }

    .entry-info .entry-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .entry-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .entry-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      line-height: 1;
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 14px;
    }

    /* 月次集計 */
    .month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .month-nav button {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .month-nav .month-label {
      font-size: 16px;
      font-weight: 700;
      min-width: 100px;
      text-align: center;
    }

    .edit-toggle {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
    }

    .edit-toggle.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .day-entry-block {
      padding: 4px 0;
    }

    .day-entry-memo {
      font-size: 12px;
      color: var(--muted);
      padding: 2px 0 6px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .day-entry-block .entry-toggles {
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .month-summary {
      background: var(--accent);
      color: white;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-around;
      text-align: center;
    }

    .month-summary .stat-label {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    .month-summary .stat-value {
      font-size: 22px;
      font-weight: 700;
    }

    .day-card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      overflow: hidden;
    }

    .day-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
    }

    .day-card-header .day-label {
      font-size: 14px;
      font-weight: 600;
    }

    .day-card-header .day-total {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .day-card-body {
      border-top: 1px solid var(--border);
      padding: 8px 0;
    }

    .day-entry {
      display: flex;
      justify-content: space-between;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .day-entry .de-price { font-weight: 500; color: var(--ink); }

    /* プリセット管理 */
    .manage-section {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .manage-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .preset-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .preset-item:last-of-type { border-bottom: none; }

    .preset-item .pi-name { font-size: 14px; font-weight: 500; }
    .preset-item .pi-price { font-size: 13px; color: var(--muted); }

    .new-preset-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      margin-top: 12px;
    }

    .new-preset-row input {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
    }

    .new-preset-row input:focus { border-color: var(--accent); }

    .new-preset-row button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* 大分類・編集UI */
    .preset-group { margin-bottom: 14px; }

    .dept-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
      border-bottom: 2px solid var(--border);
    }

    .dept-tab {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 10px 10px 0 0;
      margin-bottom: -2px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .dept-tab.active {
      color: var(--accent);
      background: var(--card);
      border-color: var(--border);
      border-bottom: 2px solid var(--card);
      box-shadow: 0 -2px 6px rgba(0,0,0,0.04);
    }

    .cat-heading {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
      margin: 4px 0 8px;
      padding-left: 8px;
      border-left: 3px solid var(--accent);
    }

    .pi-actions { display: flex; align-items: center; gap: 6px; }

    .edit-link, .del-link {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink);
    }

    .del-link { color: var(--danger); }

    .sample-tag {
      font-size: 11px;
      color: var(--muted);
      background: var(--accent-light);
      border-radius: 6px;
      padding: 3px 8px;
    }

    .preset-item.editing {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }

    .edit-fields { display: flex; flex-direction: column; gap: 8px; }

    .edit-fields input, .edit-row2 select, .new-preset-row2 select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
    }

    .edit-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .edit-actions { display: flex; gap: 8px; }

    .save-btn, .cancel-btn {
      flex: 1;
      border-radius: 8px;
      padding: 8px 0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .save-btn { background: var(--accent); color: white; border-color: var(--accent); }
    .cancel-btn { background: var(--card); color: var(--muted); }

    .hint {
      font-size: 12px;
      color: var(--muted);
      background: var(--accent-light);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .new-preset-section {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .new-preset-row2 {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }

    .new-preset-row2 button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .reset-section {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .reset-btn {
      width: 100%;
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .reset-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    /* 提出タブ */
    .submit-scroll {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .submit-table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
      white-space: nowrap;
    }

    .submit-table th,
    .submit-table td {
      border: 1px solid var(--border);
      padding: 7px 8px;
      text-align: center;
      min-width: 30px;
    }

    .submit-table thead th {
      background: var(--accent);
      color: white;
      font-weight: 700;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    /* 左固定列（メニュー・区分） */
    .submit-table .sticky-col {
      position: sticky;
      z-index: 1;
      background: var(--card);
    }
    .submit-table thead .sticky-col { z-index: 3; }
    .submit-table .sticky-col.c1 { left: 0; min-width: 72px; max-width: 72px; white-space: normal; word-break: break-all; }
    .submit-table .sticky-col.c2 { left: 72px; min-width: 80px; }
    .submit-table .sticky-col.c3 { left: 152px; min-width: 64px; text-align: right; }

    .submit-table th.today-col,

<body>

<div id="root"></div>

<script>
  window.GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwJ8_OvqZVWLUMgxBYhX78i6qS2APnhwOtOiIh5ofesUOCCmu4Q9pO4lh1M8U9mKgyQsg/exec';

  window.FIREBASE_CONFIG = {

    authDomain: "salon-sales-3c716.firebaseapp.com",
    projectId: "salon-sales-3c716",
    storageBucket: "salon-sales-3c716.firebasestorage.app",

    appId: "1:544550950340:web:0e5dfd3f9dd054e3748091"
  };
</script>

<script type="text/babel">
  const { useState, useEffect, useCallback } = React;

  // Firebase 初期化
  firebase.initializeApp(window.FIREBASE_CONFIG);
  const db = firebase.firestore();
  const auth = firebase.auth();

  // 日付ユーティリティ
  const toJST = (date = new Date()) => {
    const jst = new Date(date.getTime() + 9 * 60 * 60 * 1000);
    return jst;
  };

  const todayStr = () => {
    const d = toJST();
    return d.toISOString().slice(0, 10); // YYYY-MM-DD
  };

  const formatPrice = (n) => `¥${n.toLocaleString()}`;

  const formatTime = (ts) => {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    return jst.toISOString().slice(11, 16);
  };

  // 延長10分あたりの単価（メニュー種別ごと）
  const extUnitFor = (name) => {
    const n = name || '';
    if (n.includes('ストレッチ')) return 1500;
    if (n.includes('タイ古式') || n.includes('バリアロマ')) return 2000;
    return 1350;
  };
  // 1件の金額内訳を計算（今日タブ・集計タブ共通）
  const calcEntry = (e) => {
    const ext = ((e.extMin || 0) / 10) * extUnitFor(e.name);
    const gross = e.price + ext;
    const rate = e.discount ? (e.lodging ? 0.10 : 0.20) : 0;
    const discount = Math.round(gross * rate);
    const extra = (e.shimei ? 500 : 0) + (e.seibetsu ? 300 : 0);
    const net = gross - discount + extra;
    return { ext, gross, rate, discount, extra, net };
  };

  const CATEGORIES = ['ボディケア', 'タイ・バリ'];
  const UNCATEGORIZED = 'その他';

  const DEFAULT_PRESETS = [
    // ボディケア
    { id: 'p1', name: 'ボディケア40分', price: 5000, category: 'ボディケア', isDefault: true },
    { id: 'p2', name: 'ボディケア60分', price: 7600, category: 'ボディケア', isDefault: true },
    { id: 'p3', name: 'ボディケア80分', price: 10000, category: 'ボディケア', isDefault: true },
    { id: 'p4', name: 'セレクトボディケア60分', price: 7800, category: 'ボディケア', isDefault: true },
    { id: 'p5', name: 'セレクトボディケア80分', price: 10400, category: 'ボディケア', isDefault: true },
    { id: 'p6', name: 'セレクトボディケア100分', price: 13000, category: 'ボディケア', isDefault: true },
    { id: 'p7', name: 'セレクトボディケア120分', price: 15600, category: 'ボディケア', isDefault: true },
    { id: 'p8', name: '部分集中30分', price: 4500, category: 'ボディケア', isDefault: true },
    { id: 'p10', name: 'ストレッチ40分', price: 5500, category: 'ボディケア', isDefault: true },
    { id: 'p11', name: 'ストレッチ60分', price: 7800, category: 'ボディケア', isDefault: true },
    { id: 'p12', name: 'ストレッチ90分', price: 11000, category: 'ボディケア', isDefault: true },
    // タイ・バリ
    { id: 'p14', name: 'タイ古式60分', price: 8000, category: 'タイ・バリ', isDefault: true },
    { id: 'p15', name: 'タイ古式70分', price: 8500, category: 'タイ・バリ', isDefault: true },
    { id: 'p16', name: 'タイ古式90分', price: 11500, category: 'タイ・バリ', isDefault: true },
    { id: 'p17', name: 'タイ古式120分', price: 14500, category: 'タイ・バリ', isDefault: true },
    { id: 'p18', name: 'バリアロマ40分', price: 7000, category: 'タイ・バリ', isDefault: true },
    { id: 'p19', name: 'バリアロマ60分', price: 9800, category: 'タイ・バリ', isDefault: true },
    { id: 'p20', name: 'バリアロマ70分', price: 10000, category: 'タイ・バリ', isDefault: true },
    { id: 'p21', name: 'バリアロマ90分', price: 14000, category: 'タイ・バリ', isDefault: true },
    { id: 'p22', name: 'バリアロマ120分', price: 18000, category: 'タイ・バリ', isDefault: true },
  ];

  // プリセットを大分類ごとにグループ化（CATEGORIES の順 → その他 → 独自分類）
  const groupByCategory = (presets) => {
    const order = [...CATEGORIES, UNCATEGORIZED];
    const seen = new Set();
    const groups = [];
    const push = (cat) => {
      if (seen.has(cat)) return;
      const items = presets.filter(p => (p.category || UNCATEGORIZED) === cat);
      if (items.length) { groups.push({ category: cat, items }); seen.add(cat); }
    };
    order.forEach(push);
    presets.forEach(p => push(p.category || UNCATEGORIZED));
    return groups;
  };

  // 初期メニューを Firestore に一括登録（編集・削除できる実データとして保存）
  const seedDefaultPresets = async (uid) => {
    const col = db.collection('users').doc(uid).collection('presets');
    const base = Date.now();
    const batch = db.batch();
    DEFAULT_PRESETS.forEach((m, i) => {
      batch.set(col.doc(), {
        name: m.name,
        price: m.price,
        category: m.category,
        createdAt: base + i
      });
    });
    await batch.commit();
  };

  // ==================== コンポーネント ====================

  // 大部門の切り替えタブ
  function DeptTabs({ depts, value, onChange }) {
    if (depts.length <= 1) return null;
    return (
      <div className="dept-tabs">
        {depts.map(d => (
          <button
            key={d}
            className={`dept-tab ${value === d ? 'active' : ''}`}
            onClick={() => onChange(d)}
          >{d}</button>
        ))}
      </div>
    );
  }

  // 名前を内部的なメールアドレスへ変換（日本語名でもOKにするためUTF-8をhex化）
  const nameToEmail = (name) => {
    const bytes = new TextEncoder().encode(name.trim().toLowerCase());
    let hex = '';
    bytes.forEach(b => { hex += b.toString(16).padStart(2, '0'); });
    return `u${hex}@salon-sales.local`;
  };

  // ========== ログイン画面 ==========
  function LoginScreen() {
    const [mode, setMode] = useState('login'); // 'login' | 'signup'
    const [name, setName] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [busy, setBusy] = useState(false);

    const submit = async () => {
      setError('');
      const nm = name.trim();
      if (!nm) { setError('名前を入力してください'); return; }
      if (password.length < 6) { setError('パスワードは6文字以上で入力してください'); return; }
      setBusy(true);
      const email = nameToEmail(nm);
      try {
        if (mode === 'signup') {
          const result = await auth.createUserWithEmailAndPassword(email, password);
          await result.user.updateProfile({ displayName: nm });
          await seedDefaultPresets(result.user.uid);
        } else {
          await auth.signInWithEmailAndPassword(email, password);
        }
        // onAuthStateChanged が拾ってApp側で画面遷移
      } catch (err) {
        const map = {
          'auth/email-already-in-use': 'この名前は既に登録されています。「ログイン」を選んでください。',
          'auth/user-not-found': 'この名前は登録されていません。「新規登録」を選んでください。',
          'auth/wrong-password': 'パスワードが違います。',
          'auth/invalid-credential': '名前またはパスワードが違います。',
          'auth/weak-password': 'パスワードは6文字以上で入力してください。',
          'auth/operation-not-allowed': 'メール/パスワードログインが有効になっていません（設定が必要です）。',
          'auth/network-request-failed': 'ネットワークエラーが発生しました。',
        };
        setError(map[err.code] || ('エラー: ' + (err.message || err.code)));
      } finally {
        setBusy(false);
      }
    };

    return (
      <div className="login-wrap">
        <div className="login-card">
          <h1>💄 サロン売上管理</h1>
          <div className="login-mode">
            <button className={mode === 'login' ? 'active' : ''} onClick={() => { setMode('login'); setError(''); }}>ログイン</button>
            <button className={mode === 'signup' ? 'active' : ''} onClick={() => { setMode('signup'); setError(''); }}>新規登録</button>
          </div>
          <input
            className="login-input"
            placeholder="名前"
            value={name}
            onChange={e => setName(e.target.value)}
          />
          <input
            className="login-input"
            type="password"
            placeholder="パスワード（6文字以上）"
            value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') submit(); }}
          />
          {error && <div className="login-error">{error}</div>}
          <button className="login-submit" onClick={submit} disabled={busy}>
            {busy ? '処理中...' : (mode === 'signup' ? '登録して始める' : 'ログイン')}
          </button>
          <div className="login-hint">
            {mode === 'signup'
              ? '初めての方はこちら。名前とパスワードを決めて登録してください。'
              : '登録済みの名前とパスワードでログインしてください。'}
          </div>
        </div>
      </div>
    );
  }

  function App() {
    const [tab, setTab] = useState('today');
    const [user, setUser] = useState(null);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
      const unsub = auth.onAuthStateChanged(u => {
        setUser(u);
        setLoading(false);
      });
      return () => unsub();
    }, []);

    if (loading) return <div className="loading">読み込み中...</div>;
    if (!user) return <LoginScreen />;

    const uid = user.uid;

    return (
      <>
        <header>
          <h1>💄 サロン売上管理</h1>
          <div className="header-right">
            <span className="version">Ver 1.31</span>
            <button className="logout-btn" onClick={() => auth.signOut()}>ログアウト</button>
          </div>
        </header>

        {user.displayName && <div className="user-line">{user.displayName} さん</div>}

        <div className="tabs">
          <button className={`tab ${tab === 'today' ? 'active' : ''}`} onClick={() => setTab('today')}>今日</button>
          <button className={`tab ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>集計</button>
          <button className={`tab ${tab === 'submit' ? 'active' : ''}`} onClick={() => setTab('submit')}>提出</button>
          <button className={`tab ${tab === 'settings' ? 'active' : ''}`} onClick={() => setTab('settings')}>設定</button>
        </div>

        <div className="main">
          {tab === 'today' && <TodayTab uid={uid} />}
          {tab === 'history' && <HistoryTab uid={uid} />}
          {tab === 'submit' && <SubmitTab uid={uid} userName={user.displayName || ''} />}
          {tab === 'settings' && <SettingsTab uid={uid} />}
        </div>
      </>
    );
  }

  // ========== 今日タブ ==========
  function TodayTab({ uid }) {
    const [entries, setEntries] = useState([]);
    const [presets, setPresets] = useState([]);
    const [dept, setDept] = useState(CATEGORIES[0]);
    const [viewDate, setViewDate] = useState(todayStr());
    const today = todayStr();

    const prevDay = () => setViewDate(d => {
      const dt = new Date(d + 'T00:00:00Z');
      dt.setUTCDate(dt.getUTCDate() - 1);
      return dt.toISOString().slice(0, 10);
    });
    const nextDay = () => setViewDate(d => {
      if (d >= today) return d;
      const dt = new Date(d + 'T00:00:00Z');
      dt.setUTCDate(dt.getUTCDate() + 1);
      return dt.toISOString().slice(0, 10);
    });
    const weekday = ['日','月','火','水','木','金','土'][new Date(viewDate + 'T00:00:00+09:00').getDay()];
    const isToday = viewDate === today;

    // プリセット読み込み
    useEffect(() => {
      const ref = db.collection('users').doc(uid).collection('presets');
      ref.orderBy('createdAt').get().then(snap => {
        if (snap.empty) {
          setPresets(DEFAULT_PRESETS);
        } else {
          setPresets(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }
      });
    }, [uid]);

    // 選択日のエントリ購読
    useEffect(() => {
      setEntries([]);
      const ref = db.collection('users').doc(uid)
        .collection('days').doc(viewDate)
        .collection('entries')
        .orderBy('createdAt', 'asc');

      const unsub = ref.onSnapshot(snap => {
        setEntries(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
      return () => unsub();
    }, [uid, viewDate]);

    const dayRef = () => db.collection('users').doc(uid).collection('days').doc(viewDate);

    const addEntry = async (name, price) => {
      if (!name || !price) return;
      // 親ドキュメントを作成（集計で日付が拾えるように）
      await dayRef().set({ date: today }, { merge: true });
      await dayRef().collection('entries')
        .add({ name, price: Number(price), lodging: false, discount: false, extMin: 0, shimei: false, seibetsu: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    };

    const toggleEntryLodging = (e) =>
      dayRef().collection('entries').doc(e.id).update({ lodging: !e.lodging });
    const toggleEntryDiscount = (e) =>
      dayRef().collection('entries').doc(e.id).update({ discount: !e.discount });
    // 延長を 0→10→20→30→0 で循環
    const cycleEntryExt = (e) =>
      dayRef().collection('entries').doc(e.id).update({ extMin: ((e.extMin || 0) + 10) % 40 });
    const toggleEntryShimei = (e) =>
      dayRef().collection('entries').doc(e.id).update({ shimei: !e.shimei });
    const toggleEntrySeibetsu = (e) =>
      dayRef().collection('entries').doc(e.id).update({ seibetsu: !e.seibetsu });
    const saveEntryMemo = (e, memo) => {
      if ((e.memo || '') === memo) return;
      dayRef().collection('entries').doc(e.id).update({ memo });
    };

    const deleteEntry = async (id) => {
      await dayRef().collection('entries').doc(id).delete();
    };

    const extAmount = (e) => calcEntry(e).ext;
    const entryGross = (e) => calcEntry(e).gross;
    const entryRate = (e) => calcEntry(e).rate;
    const entryNet = (e) => calcEntry(e).net;

    const subtotal = entries.reduce((s, e) => s + calcEntry(e).gross, 0);
    const discountAmount = entries.reduce((s, e) => s + calcEntry(e).discount, 0);
    const extraTotal = entries.reduce((s, e) => s + calcEntry(e).extra, 0);
    const total = subtotal - discountAmount + extraTotal;

    const groups = groupByCategory(presets);
    const deptNames = groups.map(g => g.category);
    const activeDept = deptNames.includes(dept) ? dept : (deptNames[0] || dept);
    const deptItems = (groups.find(g => g.category === activeDept) || { items: [] }).items;

    return (
      <>
        {/* 合計 */}
        <div className="today-total">
          <div className="date-nav">
            <button onClick={prevDay}>‹</button>
            <span className="date-label">{viewDate.replace(/-/g, '/')} ({weekday}){isToday ? ' 今日' : ''}</span>
            <button onClick={nextDay} disabled={isToday}>›</button>
          </div>
          <div className="amount">{formatPrice(total)}</div>
          {(discountAmount > 0 || extraTotal > 0) && (
            <div className="discount-line">
              小計 {formatPrice(subtotal)}
              {discountAmount > 0 && <>　割引 −{formatPrice(discountAmount)}</>}
              {extraTotal > 0 && <>　追加 +{formatPrice(extraTotal)}</>}
            </div>
          )}
          <div className="count">{entries.length} 件</div>
        </div>

        {/* コース追加 */}
        <div className="add-section">
          <div className="add-section-header">
            <h2>{isToday ? 'メニューを追加' : '項目を追加'}</h2>
            <DeptTabs depts={deptNames} value={activeDept} onChange={setDept} />
          </div>
          <div className="preset-grid">
            {deptItems.map(p => (
              <button key={p.id} className="preset-btn" onClick={() => addEntry(p.name, p.price)}>
                <span className="course-name">{p.name}</span>
                <span className="course-price">{formatPrice(p.price)}</span>
              </button>
            ))}
          </div>
        </div>

        {/* 今日のリスト */}
        <div className="entry-list">
          <h2>内訳</h2>
          {entries.length === 0
            ? <div className="empty-state">{isToday ? 'まだ入力がありません' : 'この日のデータはありません'}</div>
            : entries.map(e => (
              <div key={e.id} className="entry-item">
                <div className="entry-main">
                  <div className="entry-info">
                    <div className="entry-name">{e.name}</div>
                    <div className="entry-time">{formatTime(e.createdAt)}</div>
                  </div>
                  <div className="entry-right">
                    {entryRate(e) > 0 && <span className="entry-orig">{formatPrice(entryGross(e))}</span>}
                    <span className="entry-price">{formatPrice(entryNet(e))}</span>
                    <button className="delete-btn" onClick={() => deleteEntry(e.id)}>✕</button>
                  </div>
                </div>
                <div className="entry-toggles">
                  <button className={`toggle-btn sm ${(e.extMin || 0) > 0 ? 'active' : ''}`} onClick={() => cycleEntryExt(e)}>延長{e.extMin || 0}分</button>
                  <button className={`toggle-btn sm ${e.lodging ? 'active' : ''}`} onClick={() => toggleEntryLodging(e)}>宿泊</button>
                  <button className={`toggle-btn sm ${e.discount ? 'active' : ''}`} onClick={() => toggleEntryDiscount(e)}>割引</button>
                  <button className={`toggle-btn sm ${e.shimei ? 'active' : ''}`} onClick={() => toggleEntryShimei(e)}>指名料</button>
                  <button className={`toggle-btn sm ${e.seibetsu ? 'active' : ''}`} onClick={() => toggleEntrySeibetsu(e)}>男女希望</button>
                  {(e.extMin || 0) > 0 && <span className="entry-disc-note">延長+{formatPrice(extAmount(e))}</span>}
                  {entryRate(e) > 0 && <span className="entry-disc-note">{Math.round(entryRate(e) * 100)}%オフ</span>}
                  {e.shimei && <span className="entry-disc-note" style={{color:'var(--text)'}}>指名+500</span>}
                  {e.seibetsu && <span className="entry-disc-note" style={{color:'var(--text)'}}>希望+300</span>}
                </div>
                <input
                  key={e.memo || ''}
                  className="entry-memo"
                  placeholder="メモ"
                  defaultValue={e.memo || ''}
                  onBlur={ev => saveEntryMemo(e, ev.target.value.trim())}
                />
              </div>
            ))
          }
        </div>
      </>
    );
  }

  // ========== 集計タブ ==========
  function HistoryTab({ uid }) {
    const now = toJST();
    const [year, setYear] = useState(now.getUTCFullYear());
    const [month, setMonth] = useState(now.getUTCMonth() + 1);
    const [days, setDays] = useState([]);
    const [expanded, setExpanded] = useState(null);

    useEffect(() => {
      const monthStr = `${year}-${String(month).padStart(2, '0')}`;
      const start = `${monthStr}-01`;
      const end = `${monthStr}-31`;

      db.collection('users').doc(uid).collection('days')
        .where(firebase.firestore.FieldPath.documentId(), '>=', start)
        .where(firebase.firestore.FieldPath.documentId(), '<=', end)
        .get()
        .then(async snap => {
          const result = [];
          for (const doc of snap.docs) {
            const entriesSnap = await doc.ref.collection('entries').orderBy('createdAt', 'asc').get();
            const entries = entriesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (entries.length === 0) continue;
            const subtotal = entries.reduce((s, e) => s + calcEntry(e).gross, 0);
            const discountAmount = entries.reduce((s, e) => s + calcEntry(e).discount, 0);
            const extraTotal = entries.reduce((s, e) => s + calcEntry(e).extra, 0);
            const total = subtotal - discountAmount + extraTotal;
            result.push({ date: doc.id, entries, subtotal, discountAmount, extraTotal, total });
          }
          result.sort((a, b) => b.date.localeCompare(a.date));
          setDays(result);
        });
    }, [uid, year, month]);

    const prevMonth = () => {
      if (month === 1) { setYear(y => y - 1); setMonth(12); }
      else setMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (month === 12) { setYear(y => y + 1); setMonth(1); }
      else setMonth(m => m + 1);
    };

    const monthTotal = days.reduce((s, d) => s + d.total, 0);
    const dayCount = days.length;

    return (
      <>
        <div className="month-header">
          <div className="month-nav">
            <button onClick={prevMonth}>‹</button>
            <span className="month-label">{year}年{month}月</span>
            <button onClick={nextMonth}>›</button>
          </div>
        </div>

        <div className="month-summary">
          <div>
            <div className="stat-label">月間売上</div>
            <div className="stat-value">{formatPrice(monthTotal)}</div>
          </div>
          <div>
            <div className="stat-label">営業日数</div>
            <div className="stat-value">{dayCount}日</div>
          </div>
          <div>
            <div className="stat-label">1日平均</div>
            <div className="stat-value">{dayCount ? formatPrice(Math.round(monthTotal / dayCount)) : '—'}</div>
          </div>
        </div>

        {days.length === 0
          ? <div className="empty-state" style={{background:'var(--card)',borderRadius:16,padding:32,color:'var(--muted)'}}>この月のデータはありません</div>
          : days.map(d => (
            <div key={d.date} className="day-card">
              <div className="day-card-header" onClick={() => setExpanded(expanded === d.date ? null : d.date)}>
                <span className="day-label">{d.date.replace(/-/g, '/')} ({['日','月','火','水','木','金','土'][new Date(d.date + 'T00:00:00+09:00').getDay()]})</span>
                <span className="day-total">{formatPrice(d.total)}</span>
              </div>
              {expanded === d.date && (
                <div className="day-card-body">
                  {d.entries.map((e) => {
                    const c = calcEntry(e);
                    return (
                      <div key={e.id} className="day-entry-wrap">
                        <div className="day-entry">
                          <span>
                            {e.name}
                            {c.rate > 0 ? `（${e.lodging ? '宿泊' : ''}割引${Math.round(c.rate * 100)}%）` : ''}
                            {(e.extMin || 0) > 0 ? `（延長${e.extMin}分）` : ''}
                            {e.shimei ? '（指名）' : ''}
                            {e.seibetsu ? '（男女希望）' : ''}
                          </span>
                          <span className="de-price">{formatPrice(c.net)}</span>
                        </div>
                        {e.memo && <div className="day-entry-memo">📝 {e.memo}</div>}
                      </div>
                    );
                  })}
                  {d.discountAmount > 0 && (
                    <div className="day-entry day-discount">
                      <span>割引合計</span>
                      <span className="de-price">−{formatPrice(d.discountAmount)}</span>
                    </div>
                  )}
                  {d.extraTotal > 0 && (
                    <div className="day-entry">
                      <span>追加料金合計</span>
                      <span className="de-price">+{formatPrice(d.extraTotal)}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          ))
        }
      </>
    );
  }

  // ========== 設定タブ ==========
  function SettingsTab({ uid }) {
    const [presets, setPresets] = useState([]);
    const [dept, setDept] = useState(CATEGORIES[0]);
    const [newName, setNewName] = useState('');
    const [newPrice, setNewPrice] = useState('');
    const [newCategory, setNewCategory] = useState(CATEGORIES[0]);
    const [editingId, setEditingId] = useState(null);
    const [editName, setEditName] = useState('');
    const [editPrice, setEditPrice] = useState('');
    const [editCategory, setEditCategory] = useState(CATEGORIES[0]);

    const loadPresets = useCallback(() => {
      db.collection('users').doc(uid).collection('presets')
        .orderBy('createdAt').get().then(snap => {
          if (snap.empty) {
            setPresets(DEFAULT_PRESETS);
          } else {
            setPresets(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          }
        });
    }, [uid]);

    useEffect(() => { loadPresets(); }, [loadPresets]);

    const addPreset = async () => {
      const p = parseInt(String(newPrice).replace(/,/g, ''), 10);
      if (!newName.trim() || isNaN(p) || p <= 0) {
        alert('メニュー名と金額（1以上の数字）を入力してください');
        return;
      }
      try {
        await db.collection('users').doc(uid).collection('presets').add({
          name: newName.trim(),
          price: p,
          category: newCategory,
          createdAt: Date.now()
        });
        setNewName('');
        setNewPrice('');
        loadPresets();
      } catch (e) {
        console.error(e);
        alert('追加に失敗しました：' + (e && e.message ? e.message : e));
      }
    };

    const startEdit = (p) => {
      setEditingId(p.id);
      setEditName(p.name);
      setEditPrice(String(p.price));
      setEditCategory(p.category || CATEGORIES[0]);
    };

    const cancelEdit = () => setEditingId(null);

    const saveEdit = async (p) => {
      const price = parseInt(String(editPrice).replace(/,/g, ''), 10);
      if (!editName.trim() || isNaN(price) || price <= 0) {
        alert('メニュー名と金額（1以上の数字）を入力してください');
        return;
      }
      try {
        await db.collection('users').doc(uid).collection('presets').doc(p.id).update({
          name: editName.trim(),
          price,
          category: editCategory
        });
        setEditingId(null);
        loadPresets();
      } catch (e) {
        console.error(e);
        alert('保存に失敗しました：' + (e && e.message ? e.message : e));
      }
    };

    const deletePreset = async (p) => {
      if (!window.confirm(`「${p.name}」を削除しますか？`)) return;
      try {
        await db.collection('users').doc(uid).collection('presets').doc(p.id).delete();
        loadPresets();
      } catch (e) {
        console.error(e);
        alert('削除に失敗しました：' + (e && e.message ? e.message : e));
      }
    };

    const loadDefaultMenu = async () => {
      if (!window.confirm('現在のメニューをすべて削除して、初期メニュー（ボディケア／タイ・バリ）を登録します。よろしいですか？')) return;
      try {
        const col = db.collection('users').doc(uid).collection('presets');
        const snap = await col.get();
        if (!snap.empty) {
          const delBatch = db.batch();
          snap.docs.forEach(d => delBatch.delete(d.ref));
          await delBatch.commit();
        }
        await seedDefaultPresets(uid);
        loadPresets();
        alert('初期メニューを登録しました');
      } catch (e) {
        console.error(e);
        alert('読み込みに失敗しました：' + (e && e.message ? e.message : e));
      }
    };

    const usingDefaults = presets.length > 0 && presets.every(p => p.isDefault);

    const groups = groupByCategory(presets);
    const deptNames = groups.map(g => g.category);
    const activeDept = deptNames.includes(dept) ? dept : (deptNames[0] || dept);
    const deptItems = (groups.find(g => g.category === activeDept) || { items: [] }).items;
    const onDeptChange = (d) => { setDept(d); setNewCategory(d); setEditingId(null); };

    return (
      <div className="manage-section">
        <h2>メニュー管理</h2>

        {usingDefaults && (
          <div className="hint">下記は初期サンプルです。「メニューを追加」から登録すると、編集・削除できるようになります。</div>
        )}

        <DeptTabs depts={deptNames} value={activeDept} onChange={onDeptChange} />

        <div className="preset-group">
          {deptItems.map(p => (
              editingId === p.id ? (
                <div key={p.id} className="preset-item editing">
                  <div className="edit-fields">
                    <input value={editName} onChange={e => setEditName(e.target.value)} placeholder="メニュー名" />
                    <div className="edit-row2">
                      <input value={editPrice} inputMode="numeric" onChange={e => setEditPrice(e.target.value)} placeholder="金額" />
                      <select value={editCategory} onChange={e => setEditCategory(e.target.value)}>
                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="edit-actions">
                    <button className="save-btn" onClick={() => saveEdit(p)}>保存</button>
                    <button className="cancel-btn" onClick={cancelEdit}>取消</button>
                  </div>
                </div>
              ) : (
                <div key={p.id} className="preset-item">
                  <div>
                    <div className="pi-name">{p.name}</div>
                    <div className="pi-price">{formatPrice(p.price)}</div>
                  </div>
                  <div className="pi-actions">
                    {p.isDefault
                      ? <span className="sample-tag">サンプル</span>
                      : <>
                          <button className="edit-link" onClick={() => startEdit(p)}>編集</button>
                          <button className="del-link" onClick={() => deletePreset(p)}>削除</button>
                        </>
                    }
                  </div>
                </div>
              )
          ))}
          {deptItems.length === 0 && (
            <div className="empty-state">この部門のメニューはありません</div>
          )}
        </div>

        <div className="new-preset-section">
          <div className="cat-heading">メニューを追加</div>
          <div className="new-preset-row">
            <input
              placeholder="メニュー名"
              value={newName}
              onChange={e => setNewName(e.target.value)}
            />
            <input
              placeholder="金額"
              inputMode="numeric"
              value={newPrice}
              onChange={e => setNewPrice(e.target.value)}
            />
          </div>
          <div className="new-preset-row2">
            <select value={newCategory} onChange={e => setNewCategory(e.target.value)}>
              {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <button onClick={addPreset}>追加</button>
          </div>
        </div>

        <div className="reset-section">
          <button className="reset-btn" onClick={loadDefaultMenu}>初期メニューを読み込む（現在のメニューを置き換え）</button>
          <div className="reset-note">標準メニュー（ボディケア／タイ・バリ）を一括登録します。最新のメニューに置き換えたいときに押してください。</div>
        </div>
      </div>
    );
  }

  // ========== 提出タブ ==========
  // 提出用シートの並び：コース × 区分（日帰り定価／日帰り20%OFF／宿泊定価／宿泊10%OFF）
  const SUBMIT_TIERS = [
    { type: '日帰り', tier: '定価',    lodging: false, discount: false, rate: 0   },
    { type: '日帰り', tier: '20%OFF', lodging: false, discount: true,  rate: 0.20 },
    { type: '宿泊',   tier: '定価',    lodging: true,  discount: false, rate: 0   },
    { type: '宿泊',   tier: '10%OFF', lodging: true,  discount: true,  rate: 0.10 },
  ];
  const EXT_UNITS = [
    { label: 'ボディケア延長10分', unit: 1350 },
    { label: 'ストレッチ延長10分', unit: 1500 },
    { label: 'タイ・バリ延長10分', unit: 2000 },
  ];

  function SubmitTab({ uid, userName }) {
    const now = toJST();
    const [year, setYear] = useState(now.getUTCFullYear());
    const [month, setMonth] = useState(now.getUTCMonth() + 1);
    const [entries, setEntries] = useState([]);
    const [presets, setPresets] = useState([]);
    const [loading, setLoading] = useState(true);
    const [dept, setDept] = useState(CATEGORIES[0]);
    const todayDay = (year === now.getUTCFullYear() && month === now.getUTCMonth() + 1)
      ? now.getUTCDate() : -1;
    const [selectedDay, setSelectedDay] = useState(() =>
      (new Date().getMonth() + 1 === now.getUTCMonth() + 1) ? now.getUTCDate() : 1
    );
    const [sending, setSending] = useState(false);
    const [sendResult, setSendResult] = useState(null);

    // メニュー読み込み
    useEffect(() => {
      db.collection('users').doc(uid).collection('presets')
        .orderBy('createdAt').get().then(snap => {
          setPresets(snap.empty ? DEFAULT_PRESETS : snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
    }, [uid]);

    // 選択月の全エントリ読み込み（日付つき）
    useEffect(() => {
      setLoading(true);
      const monthStr = `${year}-${String(month).padStart(2, '0')}`;
      const start = `${monthStr}-01`;
      const end = `${monthStr}-31`;
      db.collection('users').doc(uid).collection('days')
        .where(firebase.firestore.FieldPath.documentId(), '>=', start)
        .where(firebase.firestore.FieldPath.documentId(), '<=', end)
        .get()
        .then(async snap => {
          const all = [];
          for (const doc of snap.docs) {
            const day = parseInt(doc.id.slice(8, 10), 10);
            const es = await doc.ref.collection('entries').get();
            es.docs.forEach(d => all.push({ ...d.data(), _day: day }));
          }
          setEntries(all);
          setLoading(false);
        });
    }, [uid, year, month]);

    const prevMonth = () => {
      if (month === 1) { setYear(y => y - 1); setMonth(12); }
      else setMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (month === 12) { setYear(y => y + 1); setMonth(1); }
      else setMonth(m => m + 1);
    };

    const daysInMonth = new Date(year, month, 0).getDate();
    const dayList = Array.from({ length: daysInMonth }, (_, i) => i + 1);

    // メニュー名×区分×日 ごとの件数を集計
    const agg = {};
    entries.forEach(e => {
      const tierKey = e.lodging
        ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価')
        : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
      const k = `${e.name}||${tierKey}`;
      if (!agg[k]) agg[k] = {};
      agg[k][e._day] = (agg[k][e._day] || 0) + 1;
    });
    const rowOf = (name, t) => agg[`${name}||${t.type}|${t.tier}`] || {};

    const groups = groupByCategory(presets);
    const deptNames = groups.map(g => g.category);
    const activeDept = deptNames.includes(dept) ? dept : (deptNames[0] || dept);
    const deptItems = (groups.find(g => g.category === activeDept) || { items: [] }).items;

    // フッター用：選択部門の日別合計金額
    // 日×メニュー×区分 ごとの金額集計
    const amountAgg = {};
    entries.forEach(e => {
      const tierKey = e.lodging
        ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価')
        : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
      const k = `${e.name}||${tierKey}`;
      if (!amountAgg[k]) amountAgg[k] = {};
      amountAgg[k][e._day] = (amountAgg[k][e._day] || 0) + calcEntry(e).net;
    });
    const dayAmounts = {};
    const dayAmountsNoDisc = {};
    const dayCountTotals = {};
    let deptTotalAmount = 0;
    let deptTotalNoDisc = 0;
    // 部門のメニュー名セット
    const deptMenuNames = new Set(deptItems.map(p => p.name));
    // 割引前総額（gross）の日別集計
    const grossAgg = {};
    entries.forEach(e => {
      if (!deptMenuNames.has(e.name)) return;
      const tierKey = e.lodging
        ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価')
        : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
      const k = `${e.name}||${tierKey}`;
      if (!grossAgg[k]) grossAgg[k] = {};
      grossAgg[k][e._day] = (grossAgg[k][e._day] || 0) + calcEntry(e).gross + calcEntry(e).extra;
    });
    deptItems.forEach(p => {
      SUBMIT_TIERS.forEach(t => {
        const tierKey = `${t.type}|${t.tier}`;
        const amtRow = amountAgg[`${p.name}||${tierKey}`] || {};
        const grossRow = grossAgg[`${p.name}||${tierKey}`] || {};
        const cntRow = rowOf(p.name, t);
        dayList.forEach(d => {
          if (amtRow[d]) {
            dayAmounts[d] = (dayAmounts[d] || 0) + amtRow[d];
            deptTotalAmount += amtRow[d];
          }
          if (grossRow[d]) {
            dayAmountsNoDisc[d] = (dayAmountsNoDisc[d] || 0) + grossRow[d];
            deptTotalNoDisc += grossRow[d];
          }
          if (cntRow[d]) { dayCountTotals[d] = (dayCountTotals[d] || 0) + cntRow[d]; }
        });
      });
    });

    // 延長集計: extAgg[unit][tierKey][day] = 10分単位カウント
    const extAgg = {};
    entries.forEach(e => {
      if ((e.extMin || 0) === 0) return;
      const unit = extUnitFor(e.name);
      if (!extAgg[unit]) extAgg[unit] = {};
      const tierKey = e.lodging
        ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価')
        : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
      if (!extAgg[unit][tierKey]) extAgg[unit][tierKey] = {};
      extAgg[unit][tierKey][e._day] = (extAgg[unit][tierKey][e._day] || 0) + (e.extMin / 10);
    });

    // 現在の部門に属するメニューの延長行
    const deptExtItems = EXT_UNITS.filter(ex =>
      entries.some(e => deptMenuNames.has(e.name) && (e.extMin || 0) > 0 && extUnitFor(e.name) === ex.unit)
    );

    const handleEndOfDay = async () => {
      if (!window.GAS_ENDPOINT) {
        alert('GASのURLが設定されていません。index.html の GAS_ENDPOINT を設定してください。');
        return;
      }
      setSending(true);
      setSendResult(null);
      try {
        // 提出タブと同じ順序・形式でグループ化（延長行を含む）
        const groupsData = groups.map(g => {
          const gMenuNames = new Set(g.items.map(p => p.name));
          const regularItems = g.items.flatMap(p =>
            SUBMIT_TIERS.map(t => {
              const tierLabel = t.type + (t.tier !== '定価' ? ' ' + t.tier : '');
              const tierKey = `${t.type}|${t.tier}`;
              const cnt = (agg[`${p.name}||${tierKey}`] || {})[todayDay] || 0;
              const amt = (amountAgg[`${p.name}||${tierKey}`] || {})[todayDay] || 0;
              return { menu: p.name, tier: tierLabel, count: cnt, amount: amt };
            })
          );
          const extItems = EXT_UNITS.flatMap(ex =>
            SUBMIT_TIERS.map(t => {
              const tierLabel = t.type + (t.tier !== '定価' ? ' ' + t.tier : '');
              let cnt = 0;
              entries.forEach(e => {
                if (e._day !== todayDay) return;
                if (!gMenuNames.has(e.name)) return;
                if ((e.extMin || 0) === 0) return;
                if (extUnitFor(e.name) !== ex.unit) return;
                if (e.lodging === t.lodging && e.discount === t.discount) cnt += e.extMin / 10;
              });
              return { menu: ex.label, tier: tierLabel, count: cnt, amount: 0 };
            })
          );
          return { dept: g.category, items: [...regularItems, ...extItems] };
        });

        const payload = {
          userName,
          date: `${year}/${String(month).padStart(2, '0')}/${String(todayDay).padStart(2, '0')}`,
          groups: groupsData,
          totalJ: dayAmounts[todayDay] || 0,
          totalP: dayAmountsNoDisc[todayDay] || 0,
        };

        await fetch(window.GAS_ENDPOINT, { method: 'POST', body: JSON.stringify(payload) });
        setSendResult('success');
      } catch (err) {
        setSendResult('error');
      } finally {
        setSending(false);
      }
    };

    return (
      <>
        <div className="month-header">
          <div className="month-nav">
            <button onClick={prevMonth}>‹</button>
            <span className="month-label">{year}年{month}月</span>
            <button onClick={nextMonth}>›</button>
          </div>
        </div>

        <div className="add-section-header" style={{ marginBottom: 12 }}>
          <h2>部門</h2>
          <DeptTabs depts={deptNames} value={activeDept} onChange={setDept} />
        </div>

        {loading
          ? <div className="loading">読み込み中...</div>
          : (
            <div className="submit-scroll">
              <table className="submit-table">
                <thead>
                  <tr>
                    <th className="sticky-col c1">メニュー</th>
                    <th className="sticky-col c2">区分</th>
                    <th className="sticky-col c3">単価</th>
                    {dayList.map(d => (
                      <th
                        key={d}
                        data-day={d}
                        className={d === selectedDay ? 'sel-col' : d === todayDay ? 'today-col' : ''}
                        onClick={() => setSelectedDay(d)}
                        title={`${d}日を選択`}
                      >{d}</th>
                    ))}
                    <th>件数</th>
                    <th>金額</th>
                  </tr>
                </thead>
                <tbody>
                  {deptItems.map(p => (
                    SUBMIT_TIERS.map((t, i) => {
                      const row = rowOf(p.name, t);
                      const rowTotal = dayList.reduce((s, d) => s + (row[d] || 0), 0);
                      const tierKey = `${t.type}|${t.tier}`;
                      const amtRow = amountAgg[`${p.name}||${tierKey}`] || {};
                      const rowAmount = dayList.reduce((s, d) => s + (amtRow[d] || 0), 0);
                      return (
                        <tr key={p.id + '-' + i} className={rowTotal === 0 ? 'zero' : ''}>
                          {i === 0 && <td className="t-course sticky-col c1" rowSpan={SUBMIT_TIERS.length}>{p.name}</td>}
                          <td className="t-type sticky-col c2">{t.type}{t.tier === '定価' ? '' : ' ' + t.tier}</td>
                          <td className="sticky-col c3 col-price">{formatPrice(t.tier === '20%OFF' ? Math.round(p.price * 0.8) : t.tier === '10%OFF' ? Math.round(p.price * 0.9) : p.price)}</td>
                          {dayList.map(d => (
                            <td key={d} className={d === selectedDay ? 'sel-col' : d === todayDay ? 'today-col' : ''}>
                              {row[d] || ''}
                            </td>
                          ))}
                          <td className="row-total">{rowTotal || ''}</td>
                          <td className="row-total">{rowAmount ? formatPrice(rowAmount) : ''}</td>
                        </tr>
                      );
                    })
                  ))}
                  {deptExtItems.map(ex =>
                    SUBMIT_TIERS.map((t, i) => {
                      const tierKey = `${t.type}|${t.tier}`;
                      const deptRow = {};
                      entries.forEach(e => {
                        if (!deptMenuNames.has(e.name)) return;
                        if ((e.extMin || 0) === 0) return;
                        if (extUnitFor(e.name) !== ex.unit) return;
                        const tk = e.lodging ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価') : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
                        if (tk !== tierKey) return;
                        deptRow[e._day] = (deptRow[e._day] || 0) + (e.extMin / 10);
                      });
                      const rowTotal = dayList.reduce((s, d) => s + (deptRow[d] || 0), 0);
                      const tierPrice = t.tier === '20%OFF' ? Math.round(ex.unit * 0.8) : t.tier === '10%OFF' ? Math.round(ex.unit * 0.9) : ex.unit;
                      const rowAmount = dayList.reduce((s, d) => s + ((deptRow[d] || 0) * tierPrice), 0);
                      return (
                        <tr key={ex.label + i} className={rowTotal === 0 ? 'zero' : ''}>
                          {i === 0 && <td className="t-course sticky-col c1" rowSpan={SUBMIT_TIERS.length}>{ex.label}</td>}
                          <td className="t-type sticky-col c2">{t.type}{t.tier === '定価' ? '' : ' ' + t.tier}</td>
                          <td className="sticky-col c3 col-price">{formatPrice(tierPrice)}</td>
                          {dayList.map(d => (
                            <td key={d} className={d === selectedDay ? 'sel-col' : d === todayDay ? 'today-col' : ''}>
                              {deptRow[d] || ''}
                            </td>
                          ))}
                          <td className="row-total">{rowTotal || ''}</td>
                          <td className="row-total">{rowAmount ? formatPrice(rowAmount) : ''}</td>
                        </tr>
                      );
                    })
                  )}
                  {deptItems.length === 0 && (
                    <tr><td className="t-type" colSpan={daysInMonth + 5}>この部門のメニューはありません</td></tr>
                  )}
                </tbody>
                <tfoot>
                  <tr>
                    <td className="t-course sticky-col c1" colSpan={2}>割引合計（J）</td>
                    <td className="sticky-col c3"></td>
                    {dayList.map(d => (
                      <td key={d} className={d === selectedDay ? 'sel-col' : d === todayDay ? 'today-col' : ''}>
                        {d === selectedDay
                          ? (dayAmounts[d] ? formatPrice(dayAmounts[d]) : '')
                          : ''}
                      </td>
                    ))}
                    <td className="row-total">{dayList.reduce((s,d)=>(s+(dayCountTotals[d]||0)),0) || ''}</td>
                    <td className="row-total">{deptTotalAmount ? formatPrice(deptTotalAmount) : ''}</td>
                  </tr>
                  <tr>
                    <td className="t-course sticky-col c1" colSpan={2}>合計（P）</td>
                    <td></td>
                    {dayList.map(d => (
                      <td key={d} className={d === selectedDay ? 'sel-col' : d === todayDay ? 'today-col' : ''}>
                        {d === selectedDay
                          ? (dayAmountsNoDisc[d] ? formatPrice(dayAmountsNoDisc[d]) : '')
                          : ''}
                      </td>
                    ))}
                    <td className="row-total"></td>
                    <td className="row-total">{deptTotalNoDisc ? formatPrice(deptTotalNoDisc) : ''}</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          )
        }

        {todayDay !== -1 && (
          <>
            <button className="end-of-day-btn" onClick={handleEndOfDay} disabled={sending}>
              {sending ? '送信中...' : '業務終了'}
            </button>
            {sendResult && (
              <div className={`send-result ${sendResult}`}>
                {sendResult === 'success' ? 'スプレッドシートに転記しました ✓' : '送信に失敗しました。再度お試しください。'}
              </div>
            )}
          </>
        )}

        <div className="submit-note">
          選択した月の入力データを、1〜{daysInMonth}日の日別件数として転記しています（コース × 日帰り／宿泊 × 定価／割引）。部門タブで「ボディケア」「タイ・バリ」を切り替えできます。
        </div>
      </>
    );
  }

  // マウント
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
