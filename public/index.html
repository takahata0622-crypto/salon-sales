<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B-one</title>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>

  <style>
    :root {
      --bg: #F7F3EE;
      --card: #FFFFFF;
      --ink: #1A1714;
      --accent: #9B6A4A;
      --accent-light: #F3EAE0;
      --muted: #8A7F76;
      --border: #E5DDD5;
      --danger: #C0392B;
      --success: #2E7D5E;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding-bottom: 8px;
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    header h1 .leaf-icon {
      font-size: 22px;
      line-height: 1;
    }
    header h1 .title-text {
      font-style: italic;
    }

    header .version {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logout-btn {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
    }

    .user-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 16px 0;
      flex-wrap: wrap;
    }
    .user-line {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .dept-toggle-btn {
      font-size: 12px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--accent);
      background: var(--accent);
      color: white;
      cursor: pointer;
      white-space: nowrap;
      margin-left: 4px;
    }
    .dept-toggle-btn:active { opacity: 0.8; }

    /* ログイン画面 */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .login-card h1 {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }

    .login-mode {
      display: flex;
      gap: 0;
      margin-bottom: 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .login-mode button {
      flex: 1;
      padding: 9px;
      font-size: 14px;
      font-weight: 600;
      background: var(--bg);
      color: var(--muted);
      border: none;
      cursor: pointer;
    }

    .login-mode button.active {
      background: var(--accent);
      color: white;
    }

    .login-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 15px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    .login-input:focus {
      border-color: var(--accent);
    }

    .login-error {
      background: rgba(220,53,69,0.1);
      color: var(--danger);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .login-submit {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .login-submit:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .login-hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }


    .tabs {
      display: flex;
      gap: 0;
      background: var(--accent-light);
      border-radius: 10px;
      padding: 3px;
      margin: 16px 16px 0;
    }

    .tab {
      flex: 1;
      padding: 8px 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      background: none;
      border: none;
    }

    .tab.active {
      background: var(--card);
      color: var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .main { padding: 16px; }

    /* 今日の売上 */
    .today-total {
      background: var(--accent);
      color: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
      position: sticky;
      top: var(--topbar-h, 0px);
      z-index: 20;
    }
    .history-fixed {
      background: var(--bg);
      padding-bottom: 4px;
    }

    .date-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .date-nav button {
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 8px;
      color: white;
      width: 32px;
      height: 32px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .date-nav button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .date-nav .date-label {
      font-size: 14px;
      font-weight: 700;
      min-width: 140px;
    }

    .today-total .label {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .today-total .amount {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .today-total .amount-pair {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 18px;
    }

    .today-total .amount-pair .amount-item {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .today-total .amount-pair .amount-tag {
      font-size: 14px;
      font-weight: 700;
      opacity: 0.8;
      margin-right: 4px;
    }

    .today-total .count {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 4px;
    }

    .today-total .discount-line {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 6px;
      background: rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 4px 8px;
      display: inline-block;
    }

    /* 内訳ヘッダ・宿泊割引トグル */
    .entry-list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .entry-list-head h2 {
      padding: 0;
      border: none;
    }

    .toggle-btns { display: flex; gap: 8px; }

    .toggle-btn {
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn.active {
      color: white;
      background: var(--accent);
      border-color: var(--accent);
    }

    .day-discount { color: var(--danger); font-weight: 600; }
    .day-discount .de-price { color: var(--danger); }

    /* コース追加 */
    .add-section {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .add-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .add-section-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .add-section-header .dept-tabs {
      border-bottom: none;
      margin-bottom: 0;
      flex: 0;
      gap: 6px;
    }

    .add-section-header .dept-tab {
      border-radius: 20px;
      border: 1px solid var(--border) !important;
      margin-bottom: 0;
      padding: 4px 14px;
      font-size: 13px;
      line-height: 1.4;
      white-space: nowrap;
    }

    .add-section-header .dept-tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent) !important;
      box-shadow: none;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .preset-btn {
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-btn:active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: scale(0.96);
    }

    /* 伝票を追加したときの通知トースト（画面下中央にふわっと表示） */
    .add-toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      max-width: 90vw;
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
      z-index: 1000;
      pointer-events: none;
      animation: addToastIn 0.22s ease, addToastOut 0.3s ease 1.3s forwards;
    }

    .add-toast-check {
      display: inline-block;
      margin-right: 6px;
      font-weight: 900;
    }

    @keyframes addToastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(14px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes addToastOut {
      to { opacity: 0; transform: translateX(-50%) translateY(14px); }
    }

    .preset-btn .course-name {
      font-size: 13px;
      font-weight: 600;
      display: block;
    }

    .preset-btn .course-price {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      display: block;
    }

    .preset-btn:active .course-price {
      color: rgba(255,255,255,0.8);
    }

    /* カスタム入力 */
    .custom-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .custom-input-row input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
    }

    .custom-input-row input:focus {
      border-color: var(--accent);
    }

    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    /* 今日のリスト */
    .entry-list {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .entry-list h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .entry-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .entry-item:last-child { border-bottom: none; }

    .entry-memo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .entry-memo-row .entry-time {
      flex-shrink: 0;
      margin-top: 0;
    }

    .entry-memo {
      flex: 1;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 14px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      box-sizing: border-box;
    }

    .entry-memo:focus {
      border-color: var(--accent);
    }

    .entry-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .entry-toggles {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    /* オプションボタンを全幅・3列の2段グリッドで表示 */
    .entry-toggle-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 8px;
    }
    .entry-toggle-grid .toggle-btn.sm {
      width: 100%;
    }

    /* 割引率・計算式の注記 */
    .entry-notes {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .entry-orig {
      font-size: 12px;
      color: var(--muted);
      text-decoration: line-through;
    }

    .entry-disc-note {
      font-size: 14px;
      font-weight: 700;
      color: var(--danger);
    }

    .toggle-btn.sm {
      padding: 11px 10px;
      font-size: 14px;
      border-radius: 10px;
    }

    .entry-info .entry-name {
      font-size: 14px;
      font-weight: 500;
    }

    .entry-slip {
      display: inline-block;
      margin-right: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    .entry-info .entry-time {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .entry-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .entry-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    .delete-btn {
      background: #fde8e8;
      border: 1px solid var(--danger);
      color: var(--danger);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    .delete-btn:active { opacity: 0.7; }

    .reorder-btns {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .reorder-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--ink);
      cursor: pointer;
      font-size: 10px;
      line-height: 1;
      width: 24px;
      height: 14px;
      padding: 0;
      border-radius: 4px;
    }
    .reorder-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .reorder-btn:active:not(:disabled) { opacity: 0.7; }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 14px;
    }

    /* 月次集計 */
    .month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .month-nav button {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .month-nav .month-label {
      font-size: 16px;
      font-weight: 700;
      min-width: 100px;
      text-align: center;
    }

    .day-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .day-nav button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }
    .day-nav .day-label {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      flex: 1;
    }
    .today-back-btn {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--accent);
      background: white;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .edit-toggle {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
    }

    .edit-toggle.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .day-entry-block {
      padding: 4px 0;
    }

    .day-entry-memo {
      font-size: 12px;
      color: var(--muted);
      padding: 2px 0 6px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .day-entry-block .entry-toggles {
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .month-summary {
      background: var(--accent);
      color: white;
      border-radius: 16px;
      padding: 10px 18px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      text-align: center;
    }

    .month-summary > div {
      flex: 1;
      min-width: 0;
      padding: 0 4px;
    }

    .month-summary .stat-label {
      font-size: 11px;
      opacity: 0.85;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .month-summary .stat-value {
      font-size: 18px;
      font-weight: 700;
    }

    .day-card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      overflow: hidden;
    }

    .day-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
    }

    .day-card-header .day-label {
      font-size: 14px;
      font-weight: 600;
    }

    .day-card-header .day-total {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .day-card-body {
      border-top: 1px solid var(--border);
      padding: 8px 0;
    }

    .day-entry {
      display: flex;
      justify-content: space-between;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .day-entry .de-price { font-weight: 500; color: var(--ink); }

    /* プリセット管理 */
    .manage-section {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .manage-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .preset-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .preset-item:last-of-type { border-bottom: none; }

    .preset-item .pi-name { font-size: 14px; font-weight: 500; }
    .preset-item .pi-price { font-size: 13px; color: var(--muted); }

    .new-preset-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      margin-top: 12px;
    }

    .new-preset-row input {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
    }

    .new-preset-row input:focus { border-color: var(--accent); }

    .new-preset-row button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* 大分類・編集UI */
    .preset-group { margin-bottom: 14px; }

    .dept-tabs {

  // 日付ユーティリティ
  const toJST = (date = new Date()) => {
    const jst = new Date(date.getTime() + 9 * 60 * 60 * 1000);
    return jst;
  };

  const todayStr = () => {
    const d = toJST();
    return d.toISOString().slice(0, 10); // YYYY-MM-DD
  };

  const formatPrice = (n) => `¥${n.toLocaleString()}`;

  const formatTime = (ts) => {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    return jst.toISOString().slice(11, 16);
  };

  // 価格設定の唯一の真実（改定時はここだけ変更する）
  const PRICING = {
    // 延長10分あたり単価（match のいずれかを名前に含めば適用。match 空が既定）
    extUnits: [
      { key: 'stretch', match: ['ストレッチ'],  unit: 1500, label: 'ストレッチ延長10分' },
      { key: 'bari',    match: ['バリアロマ'],  unit: 2000, label: 'バリ延長10分' },

      { key: 'body',    match: [],              unit: 1350, label: 'ボディケア延長10分' }, // 既定
    ],
    discountRate: { lodging: 0.10, dayuse: 0.20 }, // 宿泊10% / 日帰り20%
    fees: { shimei: 500, seibetsu: 300, ganseihirou: 2500 }, // 指名料 / 男女希望 / 眼精疲労（タイ・バリのみ）
  };

  const slipLabel = (idx) => '伝票' + (idx < 20 ? String.fromCharCode(0x2460 + idx) : (idx + 1));

  // タイ・バリのメニューかどうか（眼精疲労オプションの対象判定）
  const isTaiBariMenu = (name) => {
    const n = name || '';

  // 延長10分あたりの単価（メニュー種別ごと）
  const extInfoFor = (name) => {
    const n = name || '';
    const hit = PRICING.extUnits.find(u => u.match.length && u.match.some(m => n.includes(m)));
    if (hit) return hit;
    return PRICING.extUnits.find(u => u.match.length === 0) || PRICING.extUnits[PRICING.extUnits.length - 1];

  const extUnitFor = (name) => extInfoFor(name).unit;

    const gross = e.price + ext;
    const rate = e.discount ? (e.lodging ? PRICING.discountRate.lodging : PRICING.discountRate.dayuse) : 0;

    const net = gross - discount + extra;
    return { ext, gross, rate, discount, extra, net };
  };

    { id: 'p15', name: 'タイ古式70分', price: 8500, category: 'タイ・バリ', isDefault: true },
    { id: 'p16', name: 'タイ古式90分', price: 11500, category: 'タイ・バリ', isDefault: true },
    { id: 'p17', name: 'タイ古式120分', price: 14500, category: 'タイ・バリ', isDefault: true },
    { id: 'p18', name: 'バリアロマ40分', price: 7000, category: 'タイ・バリ', isDefault: true },
    { id: 'p19', name: 'バリアロマ60分', price: 9800, category: 'タイ・バリ', isDefault: true },
    { id: 'p20', name: 'バリアロマ70分', price: 10000, category: 'タイ・バリ', isDefault: true },
    { id: 'p21', name: 'バリアロマ90分', price: 14000, category: 'タイ・バリ', isDefault: true },
    { id: 'p22', name: 'バリアロマ120分', price: 18000, category: 'タイ・バリ', isDefault: true },
  ];

  // 提出（スプレッドシート転記）時に既存メニューへ本数換算で折り込むメニュー
  // 例：「ボディケア60×2」は「ボディケア60分」の本数に 2 を加算する（専用行は作らない）
  const SUBMIT_ALIAS = {
    'ボディケア60×2': { name: 'ボディケア60分', qty: 2 },
  };
  const aliasOf = (name) => SUBMIT_ALIAS[name] || { name, qty: 1 };
  const isAliasMenu = (name) => !!SUBMIT_ALIAS[name];

  // プリセットを大分類ごとにグループ化（CATEGORIES の順 → その他 → 独自分類）
  const groupByCategory = (presets) => {
    const order = [...CATEGORIES, UNCATEGORIZED];
    const seen = new Set();
    const groups = [];
    const push = (cat) => {
      if (seen.has(cat)) return;
      const items = presets.filter(p => (p.category || UNCATEGORIZED) === cat);
      if (items.length) { groups.push({ category: cat, items }); seen.add(cat); }
    };
    order.forEach(push);
    presets.forEach(p => push(p.category || UNCATEGORIZED));
    return groups;
  };

  // 初期メニューを Firestore に一括登録（編集・削除できる実データとして保存）
  const seedDefaultPresets = async (uid) => {
    const col = db.collection('users').doc(uid).collection('presets');
    const base = Date.now();
    const batch = db.batch();
    DEFAULT_PRESETS.forEach((m, i) => {
      batch.set(col.doc(), {
        name: m.name,
        price: m.price,
        category: m.category,
        createdAt: base + i
      });
    });
    await batch.commit();
  };

  // 既存ユーザーに不足している既定メニューを正しい並び順で補完する
  // （DEFAULT_PRESETS に項目を追加した場合の移行用）
  const syncMissingDefaultPresets = async (uid, storedDocs) => {
    const byName = new Map(storedDocs.map(d => [d.name, d]));
    const missing = DEFAULT_PRESETS.filter(dp => !byName.has(dp.name));
    if (!missing.length) return false;
    const col = db.collection('users').doc(uid).collection('presets');
    const batch = db.batch();
    missing.forEach(dp => {
      const idx = DEFAULT_PRESETS.findIndex(x => x.name === dp.name);
      // 直前にある既存の既定メニューの createdAt を基準に並び順を決める
      let createdAt = Date.now();
      for (let i = idx - 1; i >= 0; i--) {
        const prev = byName.get(DEFAULT_PRESETS[i].name);
        if (prev && typeof prev.createdAt === 'number') {
          createdAt = prev.createdAt + 0.001 * (idx - i);
          break;
        }
      }
      batch.set(col.doc(), { name: dp.name, price: dp.price, category: dp.category, createdAt });
    });
    await batch.commit();
    return true;
  };

  // 運用をやめたメニュー（名前一致）を各ユーザーの presets から削除する移行用
  const OBSOLETE_PRESET_NAMES = ['バリ初売りチケット', 'タイ初売りチケット'];
  const removeObsoletePresets = async (uid, storedDocs) => {
    const targets = storedDocs.filter(d => OBSOLETE_PRESET_NAMES.includes(d.name));
    if (!targets.length) return false;
    const col = db.collection('users').doc(uid).collection('presets');
    const batch = db.batch();
    targets.forEach(d => batch.delete(col.doc(d.id)));
    await batch.commit();
    return true;
  };

  // ==================== コンポーネント ====================

  // 大部門の切り替えタブ
  function DeptTabs({ depts, value, onChange }) {
    if (depts.length <= 1) return null;
    return (
      <div className="dept-tabs">
        {depts.map(d => (
          <button
            key={d}
            className={`dept-tab ${value === d ? 'active' : ''}`}
            onClick={() => onChange(d)}
          >{d}</button>
        ))}
      </div>
    );
  }

  // 名前を内部的なメールアドレスへ変換（日本語名でもOKにするためUTF-8をhex化）
  const nameToEmail = (name) => {
    const bytes = new TextEncoder().encode(name.trim().toLowerCase());
    let hex = '';
    bytes.forEach(b => { hex += b.toString(16).padStart(2, '0'); });
    return `u${hex}@salon-sales.local`;
  };

  // ========== ログイン画面 ==========
  function LoginScreen() {
    const [mode, setMode] = useState('login'); // 'login' | 'signup'
    const [name, setName] = useState('');
    const [password, setPassword] = useState('');
    const [error, setError] = useState('');
    const [busy, setBusy] = useState(false);

    const submit = async () => {
      setError('');
      const nm = name.trim();
      if (!nm) { setError('名前を入力してください'); return; }
      if (password.length < 6) { setError('パスワードは6文字以上で入力してください'); return; }
      setBusy(true);
      const email = nameToEmail(nm);
      try {
        if (mode === 'signup') {
          const result = await auth.createUserWithEmailAndPassword(email, password);
          await result.user.updateProfile({ displayName: nm });
          await seedDefaultPresets(result.user.uid);
        } else {
          await auth.signInWithEmailAndPassword(email, password);
        }
        // onAuthStateChanged が拾ってApp側で画面遷移
      } catch (err) {
        const map = {
          'auth/email-already-in-use': 'この名前は既に登録されています。「ログイン」を選んでください。',
          'auth/user-not-found': 'この名前は登録されていません。「新規登録」を選んでください。',
          'auth/wrong-password': 'パスワードが違います。',
          'auth/invalid-credential': '名前またはパスワードが違います。',
          'auth/weak-password': 'パスワードは6文字以上で入力してください。',
          'auth/operation-not-allowed': 'メール/パスワードログインが有効になっていません（設定が必要です）。',
          'auth/network-request-failed': 'ネットワークエラーが発生しました。',
        };
        setError(map[err.code] || ('エラー: ' + (err.message || err.code)));
      } finally {
        setBusy(false);
      }
    };

    return (
      <div className="login-wrap">
        <div className="login-card">
          <h1>🌿 B-one</h1>
          <div className="login-mode">
            <button className={mode === 'login' ? 'active' : ''} onClick={() => { setMode('login'); setError(''); }}>ログイン</button>
            <button className={mode === 'signup' ? 'active' : ''} onClick={() => { setMode('signup'); setError(''); }}>新規登録</button>
          </div>
          <input
            className="login-input"
            placeholder="名前（本名・スペース無し）"
            value={name}
            onChange={e => setName(e.target.value)}
          />
          <input
            className="login-input"
            type="password"
            placeholder="パスワード（6文字以上）"
            value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') submit(); }}
          />
          {error && <div className="login-error">{error}</div>}
          <button className="login-submit" onClick={submit} disabled={busy}>
            {busy ? '処理中...' : (mode === 'signup' ? '登録して始める' : 'ログイン')}
          </button>
          <div className="login-hint">
            {mode === 'signup'
              ? '初めての方はこちら。名前とパスワードを決めて登録してください。'
              : '登録済みの名前とパスワードでログインしてください。'}
          </div>
          {mode === 'login' && (
            <div className="login-hint" style={{marginTop:8}}>パスワードを忘れた場合は管理者に連絡してください。</div>
          )}
        </div>
      </div>
    );
  }

  function App() {
    const [tab, setTab] = useState('today');
    const [user, setUser] = useState(null);
    const [loading, setLoading] = useState(true);
    const [dept, setDept] = useState(CATEGORIES[0]);
    const [viewDate, setViewDate] = useState(todayStr());

    useEffect(() => {
      const unsub = auth.onAuthStateChanged(u => {
        setUser(u);
        setLoading(false);
        if (u) {
          db.collection('users').doc(u.uid).collection('meta').doc('prefs').get().then(snap => {

              setDept(snap.data().dept);
            }
          }).catch(() => {});
        }
      });
      return () => unsub();
    }, []);

    const handleSetDept = useCallback((d) => {

      if (user) {
        db.collection('users').doc(user.uid).collection('meta').doc('prefs')

      }

    const topbarRef = useRef(null);

    if (loading) return <div className="loading">読み込み中...</div>;

    return (

                  {dept}
                </button>

          <div className="tabs">

          {tab === 'history' && <HistoryTab uid={uid} />}
          {tab === 'submit' && <SubmitTab uid={uid} userName={user.displayName || ''} dept={dept} setDept={handleSetDept} viewDate={viewDate} setViewDate={setViewDate} />}
          {tab === 'confirm' && <ConfirmTab userName={user.displayName || ''} />}
