  // ========== 今日タブ ==========
  function TodayTab({ uid, userName, dept, setDept, viewDate, setViewDate }) {
    const [entries, setEntries] = useState([]);
    const [presets, setPresets] = useState([]);
    const [submittedDates, setSubmittedDates] = useState(new Set());
    const [editConfirmed, setEditConfirmed] = useState(new Set());
    const [toast, setToast] = useState(null); // 追加完了の通知 {name, id}
    const toastTimer = useRef(null);
    const today = todayStr();

    // 伝票を追加したことを画面で分かりやすく知らせるトースト
    const showAddedToast = (name) => {
      setToast({ name, id: Date.now() });
      if (toastTimer.current) clearTimeout(toastTimer.current);
      toastTimer.current = setTimeout(() => setToast(null), 1600);
    };
    useEffect(() => () => { if (toastTimer.current) clearTimeout(toastTimer.current); }, []);

    const prevDay = () => setViewDate(d => {
      const dt = new Date(d + 'T00:00:00Z');
      dt.setUTCDate(dt.getUTCDate() - 1);
      return dt.toISOString().slice(0, 10);
    });
    const nextDay = () => setViewDate(d => {
      if (d >= today) return d;
      const dt = new Date(d + 'T00:00:00Z');
      dt.setUTCDate(dt.getUTCDate() + 1);
      return dt.toISOString().slice(0, 10);
    });
    const weekday = ['日','月','火','水','木','金','土'][new Date(viewDate + 'T00:00:00+09:00').getDay()];
    const isToday = viewDate === today;

    // プリセット読み込み
    useEffect(() => {
      const ref = db.collection('users').doc(uid).collection('presets');
      ref.orderBy('createdAt').get().then(async snap => {
        if (snap.empty) {
          setPresets(DEFAULT_PRESETS);
          return;
        }
        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const removed = await removeObsoletePresets(uid, docs);
        const cleaned = docs.filter(d => !OBSOLETE_PRESET_NAMES.includes(d.name));
        const added = await syncMissingDefaultPresets(uid, cleaned);
        if (added || removed) {
          const snap2 = await ref.orderBy('createdAt').get();
          setPresets(snap2.docs.map(d => ({ id: d.id, ...d.data() })));
        } else {
          setPresets(cleaned);
        }
      });
    }, [uid]);

    // 選択日のエントリ購読
    useEffect(() => {
      setEntries([]);
      const ref = db.collection('users').doc(uid)
        .collection('days').doc(viewDate)
        .collection('entries')
        .orderBy('createdAt', 'asc');

      const unsub = ref.onSnapshot(snap => {
        setEntries(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
      return () => unsub();
    }, [uid, viewDate]);

    // 送信済み日付を購読（提出タブと同じ submitState を参照）
    useEffect(() => {
      const ref = db.collection('users').doc(uid).collection('meta').doc('submitState');
      const unsub = ref.onSnapshot(snap => {
        const dates = (snap.exists && snap.data().dates) || [];
        setSubmittedDates(new Set(dates));
      });
      return () => unsub();
    }, [uid]);

    const dayRef = () => db.collection('users').doc(uid).collection('days').doc(viewDate);

    // 表示中の日付が送信済みのとき、編集前に確認する。
    // OKしたら、その日を「未送信」に戻す（提出タブのボタンが業務終了に戻り、確認タブの名前も外れる）。
    // 一度OKしたらその日は同一セッション中は再確認しない（操作のたびに出ないように）。
    const viewKey = viewDate.replace(/-/g, ''); // YYYYMMDD
    const revertToUnsent = (key) => {
      // 自分の送信済みフラグを外す
      db.collection('users').doc(uid).collection('meta').doc('submitState')
        .set({ dates: firebase.firestore.FieldValue.arrayRemove(key) }, { merge: true });
      // 共有の送信記録（確認タブ）からも自分の名前を外す
      if (userName) {
        db.collection('submitLog').doc(key)
          .set({ names: firebase.firestore.FieldValue.arrayRemove(userName) }, { merge: true });
      }
    };
    const confirmEditIfSubmitted = () => {
      if (!submittedDates.has(viewKey)) return true;
      if (editConfirmed.has(viewKey)) return true;
      const ok = window.confirm('この日はすでに送信済みです。編集しますか？\n編集すると「未送信」に戻ります。編集後は提出タブから再度送信してください。');
      if (ok) {
        setEditConfirmed(prev => new Set(prev).add(viewKey));
        revertToUnsent(viewKey);
      }
      return ok;
    };

    const addEntry = async (name, price) => {
      if (!name || price == null || price === '') return;
      if (!confirmEditIfSubmitted()) return;
      // 親ドキュメントを作成（集計で日付が拾えるように）
      await dayRef().set({ date: today }, { merge: true });
      await dayRef().collection('entries')
        .add({ name, price: Number(price), lodging: false, discount: false, extMin: 0, shimei: false, seibetsu: false, ganseihirou: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      showAddedToast(name);
    };

    const toggleEntryLodging = (e) => {
      if (!confirmEditIfSubmitted()) return;
      dayRef().collection('entries').doc(e.id).update({ lodging: !e.lodging });
    };
    const toggleEntryDiscount = (e) => {
      if (!confirmEditIfSubmitted()) return;
      dayRef().collection('entries').doc(e.id).update({ discount: !e.discount });
    };
    // 延長を 0→10→20→30→0 で循環
    const cycleEntryExt = (e) => {
      if (!confirmEditIfSubmitted()) return;
      dayRef().collection('entries').doc(e.id).update({ extMin: ((e.extMin || 0) + 10) % 40 });
    };
    const toggleEntryShimei = (e) => {
      if (!confirmEditIfSubmitted()) return;
      dayRef().collection('entries').doc(e.id).update({ shimei: !e.shimei });
    };
    const toggleEntrySeibetsu = (e) => {
      if (!confirmEditIfSubmitted()) return;
      dayRef().collection('entries').doc(e.id).update({ seibetsu: !e.seibetsu });
    };
    const toggleEntryGanseihirou = (e) => {
      if (!confirmEditIfSubmitted()) return;
      dayRef().collection('entries').doc(e.id).update({ ganseihirou: !e.ganseihirou });
    };
    const saveEntryMemo = (e, memo) => {
      if ((e.memo || '') === memo) return;
      if (!confirmEditIfSubmitted()) return;
      dayRef().collection('entries').doc(e.id).update({ memo });
    };

    const deleteEntry = async (id) => {
      if (!confirmEditIfSubmitted()) return;
      await dayRef().collection('entries').doc(id).delete();
    };

    // 並び替え：隣り合うエントリの createdAt を入れ替えて順番を変更する
    const moveEntry = async (idx, dir) => {
      if (!confirmEditIfSubmitted()) return;
      const j = idx + dir;
      if (j < 0 || j >= entries.length) return;
      const a = entries[idx], b = entries[j];
      if (!a.createdAt || !b.createdAt) return;
      const batch = db.batch();
      batch.update(dayRef().collection('entries').doc(a.id), { createdAt: b.createdAt });
      batch.update(dayRef().collection('entries').doc(b.id), { createdAt: a.createdAt });
      await batch.commit();
    };

    const extAmount = (e) => calcEntry(e).ext;
    const entryGross = (e) => calcEntry(e).gross;
    const entryRate = (e) => calcEntry(e).rate;
    const entryNet = (e) => calcEntry(e).net;
    // 内訳の計算式の各項目を組み立てる（例: コース4,500＋延長1,215＋男女希望300）
    // discounted=true の項目（コース・延長）は割引後の金額で、金額のみ赤文字で表示する
    const entryBreakdown = (e) => {
      const c = calcEntry(e);
      // 延長は単体で割引を適用、コースは合計から逆算して端数のズレを残額に寄せる
      const extNet = c.rate > 0 ? c.ext - Math.round(c.ext * c.rate) : c.ext;
      const courseNet = (c.gross - c.discount) - extNet;
      const parts = [{ label: 'コース', amount: courseNet, discounted: c.rate > 0 }];
      if ((e.extMin || 0) > 0) parts.push({ label: '延長', amount: extNet, discounted: c.rate > 0 });
      if (e.ganseihirou) parts.push({ label: '眼精疲労', amount: PRICING.fees.ganseihirou, discounted: false });
      if (e.shimei) parts.push({ label: '指名', amount: PRICING.fees.shimei, discounted: false });
      if (e.seibetsu) parts.push({ label: '男女希望', amount: PRICING.fees.seibetsu, discounted: false });
      return parts;
    };

    const subtotal = entries.reduce((s, e) => s + calcEntry(e).gross, 0);
    const discountAmount = entries.reduce((s, e) => s + calcEntry(e).discount, 0);
    const extraTotal = entries.reduce((s, e) => s + calcEntry(e).extra, 0);
    const total = subtotal - discountAmount + extraTotal;
    const totalNoDisc = subtotal + extraTotal;

    const groups = groupByCategory(presets);
    const deptNames = groups.map(g => g.category);
    const activeDept = deptNames.includes(dept) ? dept : (deptNames[0] || dept);
    const deptItems = (groups.find(g => g.category === activeDept) || { items: [] }).items;

    return (
      <>
        {toast && (
          <div className="add-toast" key={toast.id}>
            <span className="add-toast-check">✓</span>「{toast.name}」を追加しました
          </div>
        )}
        {/* 合計 */}
        <div className="today-total">
          <div className="date-nav">
            <button onClick={prevDay}>‹</button>
            <span className="date-label">{viewDate.replace(/-/g, '/')} ({weekday}){isToday ? ' 今日' : ''}</span>
            <button onClick={nextDay} disabled={isToday}>›</button>
          </div>
          {!isToday && (
            <div style={{textAlign:'center', marginBottom:6}}>
              <button className="today-back-btn" onClick={() => setViewDate(today)}>今日に戻る</button>
            </div>
          )}
          <div className="amount-pair">
            <span className="amount-item"><span className="amount-tag">P</span>{formatPrice(totalNoDisc)}</span>
            <span className="amount-item"><span className="amount-tag">J</span>{formatPrice(total)}</span>
          </div>
          {(discountAmount > 0 || extraTotal > 0) && (
            <div className="discount-line">
              コース {formatPrice(subtotal)}
              {discountAmount > 0 && <>　割引 −{formatPrice(discountAmount)}</>}
              {extraTotal > 0 && <>　追加 +{formatPrice(extraTotal)}</>}
            </div>
          )}
          <div className="count">{entries.length} 件</div>
        </div>

        {/* コース追加 */}
        <div className="add-section">
          <div className="add-section-header">
            <h2>{isToday ? '伝票を追加' : '項目を追加'}</h2>
          </div>
          <div className="preset-grid">
            {deptItems.map(p => (
              <button key={p.id} className="preset-btn" onClick={() => addEntry(p.name, p.price)}>
                <span className="course-name">{p.name}</span>
                <span className="course-price">{formatPrice(p.price)}</span>
              </button>
            ))}
          </div>
        </div>

        {/* 今日のリスト */}
        <div className="entry-list">
          <h2>内訳 <span style={{fontSize:'11px', color:'var(--muted)', fontWeight:'normal'}}>※実際の伝票の金額と照らし合わせてください</span></h2>
          {entries.length === 0
            ? <div className="empty-state">{isToday ? 'まだ入力がありません' : 'この日のデータはありません'}</div>
            : entries.map((e, idx) => (
              <div key={e.id} className="entry-item">
                <div className="entry-main">
                  <div className="entry-info">
                    <div className="entry-name"><span className="entry-slip">{slipLabel(idx)}</span>{e.name}</div>
                  </div>
                  <div className="entry-right">
                    {entryRate(e) > 0 && <span className="entry-orig">{formatPrice(entryGross(e) + calcEntry(e).extra)}</span>}
                    <span className="entry-price">{formatPrice(entryNet(e))}</span>
                    <div className="reorder-btns">
                      <button className="reorder-btn" disabled={idx === 0} onClick={() => moveEntry(idx, -1)}>▲</button>
                      <button className="reorder-btn" disabled={idx === entries.length - 1} onClick={() => moveEntry(idx, 1)}>▼</button>
                    </div>
                    <button className="delete-btn" onClick={() => deleteEntry(e.id)}>✕</button>
                  </div>
                </div>
                <div className="entry-toggle-grid">
                  <button className={`toggle-btn sm ${(e.extMin || 0) > 0 ? 'active' : ''}`} onClick={() => cycleEntryExt(e)}>延長{e.extMin || 0}分</button>
                  {isTaiBariMenu(e.name) && (
                    <button className={`toggle-btn sm ${e.ganseihirou ? 'active' : ''}`} onClick={() => toggleEntryGanseihirou(e)}>眼精疲労</button>
                  )}
                  <button className={`toggle-btn sm ${e.lodging ? 'active' : ''}`} onClick={() => toggleEntryLodging(e)}>宿泊</button>
                  <button className={`toggle-btn sm ${e.discount ? 'active' : ''}`} onClick={() => toggleEntryDiscount(e)}>割引</button>
                  <button className={`toggle-btn sm ${e.shimei ? 'active' : ''}`} onClick={() => toggleEntryShimei(e)}>指名料</button>
                  <button className={`toggle-btn sm ${e.seibetsu ? 'active' : ''}`} onClick={() => toggleEntrySeibetsu(e)}>男女希望</button>
                </div>
                {(entryRate(e) > 0 || (e.extMin || 0) > 0 || e.ganseihirou || e.shimei || e.seibetsu) && (
                  <div className="entry-notes">
                    {entryRate(e) > 0 && <span className="entry-disc-note">{Math.round(entryRate(e) * 100)}%オフ</span>}
                    {((e.extMin || 0) > 0 || entryRate(e) > 0 || e.ganseihirou || e.shimei || e.seibetsu) && (
                      <span className="entry-disc-note" style={{color:'var(--ink)'}}>
                        {entryBreakdown(e).map((p, i) => (
                          <React.Fragment key={i}>
                            {i > 0 && '＋'}
                            {p.label}
                            <span style={p.discounted ? {color:'var(--danger)'} : undefined}>{p.amount.toLocaleString()}</span>
                          </React.Fragment>
                        ))}
                      </span>
                    )}
                  </div>
                )}
                <div className="entry-memo-row">
                  <input
                    key={e.memo || ''}
                    className="entry-memo"
                    placeholder="メモ"
                    defaultValue={e.memo || ''}
                    onBlur={ev => saveEntryMemo(e, ev.target.value.trim())}
                  />
                  <span className="entry-time">{formatTime(e.createdAt)}</span>
                </div>
              </div>
            ))
          }
        </div>
      </>
    );
  }

  // ========== 集計タブ ==========
  function HistoryTab({ uid }) {
    const now = toJST();
    const [year, setYear] = useState(now.getUTCFullYear());
    const [month, setMonth] = useState(now.getUTCMonth() + 1);
    const [days, setDays] = useState([]);
    const [expanded, setExpanded] = useState(null);
    const [goalAmount, setGoalAmount] = useState(0);
    const [commission, setCommission] = useState(0);
    const [goalType, setGoalType] = useState('sales'); // 'sales' | 'takehome'
    const [workDays, setWorkDays] = useState(0);
    const [savingGoal, setSavingGoal] = useState(false);

    const monthKey = `${year}-${String(month).padStart(2,'0')}`;

    useEffect(() => {
      db.collection('users').doc(uid).collection('meta').doc('goals')
        .get().then(doc => {
          if (doc.exists) {
            const data = doc.data();
            const key = monthKey;
            setGoalAmount(data[key]?.goal || 0);
            setCommission(data[key]?.commission || 0);
            setGoalType(data[key]?.goalType || 'sales');
            setWorkDays(data[key]?.workDays || 0);
          } else {
            setGoalAmount(0);
            setCommission(0);
            setGoalType('sales');
            setWorkDays(0);
          }
        });
    }, [uid, year, month]);

    const saveGoal = async () => {
      setSavingGoal(true);
      await db.collection('users').doc(uid).collection('meta').doc('goals')
        .set({ [monthKey]: { goal: goalAmount, commission, goalType, workDays } }, { merge: true });
      setSavingGoal(false);
    };

    useEffect(() => {
      const monthStr = `${year}-${String(month).padStart(2, '0')}`;
      const start = `${monthStr}-01`;
      const end = `${monthStr}-31`;

      db.collection('users').doc(uid).collection('days')
        .where(firebase.firestore.FieldPath.documentId(), '>=', start)
        .where(firebase.firestore.FieldPath.documentId(), '<=', end)
        .get()
        .then(async snap => {
          const result = [];
          for (const doc of snap.docs) {
            const entriesSnap = await doc.ref.collection('entries').orderBy('createdAt', 'asc').get();
            const entries = entriesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (entries.length === 0) continue;
            const subtotal = entries.reduce((s, e) => s + calcEntry(e).gross, 0);
            const discountAmount = entries.reduce((s, e) => s + calcEntry(e).discount, 0);
            const extraTotal = entries.reduce((s, e) => s + calcEntry(e).extra, 0);
            const total = subtotal - discountAmount + extraTotal;
            result.push({ date: doc.id, entries, subtotal, discountAmount, extraTotal, total });
          }
          result.sort((a, b) => b.date.localeCompare(a.date));
          setDays(result);
        });
    }, [uid, year, month]);

    const prevMonth = () => {
      if (month === 1) { setYear(y => y - 1); setMonth(12); }
      else setMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (month === 12) { setYear(y => y + 1); setMonth(1); }
      else setMonth(m => m + 1);
    };

    // 月間売上は割引前金額（小計＋追加）で集計
    const monthTotal = days.reduce((s, d) => s + d.subtotal + d.extraTotal, 0);
    const dayCount = days.length;
    // 支給ルール：指名料は歩合をかけず100%支給、男女希望は支給対象外（0%）
    const shimeiCount = days.reduce((s, d) => s + d.entries.filter(e => e.shimei).length, 0);
    const shimeiTotal = days.reduce((s, d) => s + d.entries.reduce((t, e) => t + (e.shimei ? PRICING.fees.shimei : 0), 0), 0);
    const seibetsuTotal = days.reduce((s, d) => s + d.entries.reduce((t, e) => t + (e.seibetsu ? PRICING.fees.seibetsu : 0), 0), 0);
    // ボディケア初売りチケットは売上0だが、給料計算では1枚¥5,000を歩合対象に含める
    const ticketCount = days.reduce((s, d) => s + d.entries.filter(e => isBodyTicket(e.name)).length, 0);
    const ticketSalaryBase = ticketCount * TICKET_SALARY;
    // 歩合の対象額（指名料・男女希望を除いた売上＋チケット給料分）
    const commissionBase = monthTotal - shimeiTotal - seibetsuTotal + ticketSalaryBase;
    const payEstimate = commission > 0 ? Math.round(commissionBase * (commission / 100)) + shimeiTotal : 0;
    // グラフ・達成率用の売上目標（手取目標の場合は必要売上に換算）
    const salesTarget = goalAmount > 0
      ? (goalType === 'takehome' && commission > 0 ? Math.round(goalAmount / (commission / 100)) : goalAmount)
      : 0;
    // 達成率（月選択行の右端でも使うため上位スコープで算出）
    const todayD = toJST().getUTCDate();
    const targetToday = salesTarget > 0 ? Math.round(salesTarget / 30 * todayD) : 0;
    const rate = targetToday > 0 ? Math.round((monthTotal / targetToday) * 100) : null;

    return (
      <>
        <div className="history-fixed">
        <div className="month-header">
          <div className="month-nav">
            <button onClick={prevMonth}>‹</button>
            <span className="month-label">{year}年{month}月</span>
            <button onClick={nextMonth}>›</button>
          </div>
          {rate !== null && (
            <div style={{textAlign:'right', lineHeight:1.2}}>
              <div className="stat-label" style={{fontSize:11, opacity:0.7}}>今日時点の達成率</div>
              <div style={{fontSize:18, fontWeight:700, color: rate >= 100 ? '#27ae60' : 'inherit'}}>
                {rate}%{rate >= 100 ? ' 🎉' : ''}
              </div>
            </div>
          )}
        </div>

        {(() => {
          const dailyAvg = dayCount > 0 ? Math.round(monthTotal / dayCount) : 0;
          const goalDailyAvg = salesTarget > 0 && workDays > 0 ? Math.round(salesTarget / workDays) : 0;
          return (
            <>
              <div className="month-summary">
                <div>
                  <div className="stat-label">月間売上</div>
                  <div className="stat-value">{formatPrice(monthTotal)}</div>
                </div>
                <div>
                  <div className="stat-label">チケット込月間売上</div>
                  <div className="stat-value">{formatPrice(monthTotal + ticketSalaryBase)}</div>
                </div>
                {salesTarget > 0 && (
                  <div>
                    <div className="stat-label">{goalType === 'takehome' ? '今日時点の必要売上' : '今日時点の目標売上'}</div>
                    <div className="stat-value">{formatPrice(targetToday)}</div>
                  </div>
                )}
              </div>
              <div className="month-summary" style={{marginTop:6}}>
                {salesTarget > 0 && (
                  <div>
                    <div className="stat-label">目標売上</div>
                    <div className="stat-value">{formatPrice(salesTarget)}</div>
                  </div>
                )}
                <div>
                  <div className="stat-label">1日平均（{dayCount}日分）</div>
                  <div className="stat-value">{dailyAvg ? formatPrice(dailyAvg) : '—'}</div>
                </div>
                {goalDailyAvg > 0 && (
                  <div>
                    <div className="stat-label">目標1日平均</div>
                    <div className="stat-value">{formatPrice(goalDailyAvg)}</div>
                  </div>
                )}
              </div>
              <div className="month-summary" style={{marginTop:6}}>
                <div>
                  <div className="stat-label">指名人数</div>
                  <div className="stat-value">{shimeiCount}人</div>
                </div>
                <div>
                  <div className="stat-label">指名金額</div>
                  <div className="stat-value">{formatPrice(shimeiTotal)}</div>
                </div>
                {payEstimate > 0 && (
                  <div>
                    <div className="stat-label">支給見込み</div>
                    <div className="stat-value">{formatPrice(payEstimate)}</div>
                  </div>
                )}
              </div>
            </>
          );
        })()}

        <div className="goal-box">
          <div className="goal-row">
            <div className="goal-type-toggle">
              <button className={goalType === 'sales' ? 'active' : ''} onClick={() => setGoalType('sales')}>目標売上</button>
              <button className={goalType === 'takehome' ? 'active' : ''} onClick={() => setGoalType('takehome')}>目標手取</button>
            </div>
            <input className="goal-input" type="number" step="10000" min="0"
              value={goalAmount || ''} onChange={e => setGoalAmount(Number(e.target.value) || 0)} placeholder="" />
            <span className="goal-unit">円</span>
          </div>
          <div className="goal-row" style={{marginTop:6}}>
            <label className="goal-label">出勤日数</label>
            <input className="goal-input goal-input-sm" type="number" min="0" max="31"
              value={workDays || ''} onChange={e => setWorkDays(Number(e.target.value) || 0)} placeholder="" />
            <span className="goal-unit">日</span>
            <label className="goal-label" style={{marginLeft:8}}>歩合</label>
            <input className="goal-input goal-input-sm" type="number" step="0.5" min="0" max="100"
              value={commission === 0 ? '' : commission} onChange={e => setCommission(Number(e.target.value) || 0)} placeholder="" />
            <span className="goal-unit">%</span>
            <button className="goal-save-btn" style={{marginLeft:'auto'}} onClick={saveGoal} disabled={savingGoal}>
              {savingGoal ? '保存中' : '保存'}
            </button>
          </div>
        </div>

        {days.length > 0 && (() => {
          const dim = new Date(year, month, 0).getDate();
          const daily = Array.from({ length: dim }, () => 0);
          days.forEach(d => {
            const dn = parseInt(d.date.slice(8, 10), 10);
            if (dn >= 1 && dn <= dim) {
              // チケット金額込み：ボディケア初売りチケット 1枚=5000円を当日分に加算
              const ticketsForDay = (d.entries || []).filter(e => isBodyTicket(e.name)).length * TICKET_SALARY;
              daily[dn - 1] = d.subtotal + d.extraTotal + ticketsForDay;
            }
          });
          const cum = [];
          let run = 0;
          daily.forEach(v => { run += v; cum.push(run); });
          const maxDaily = Math.max(1, ...daily);
          const maxCum = Math.max(1, run, salesTarget);
          const H = 200, padT = 12, padB = 22, padL = 40, padR = 46;
          const step = 24;
          const innerH = H - padT - padB;
          const W = padL + padR + dim * step;
          const barW = step * 0.56;
          const cx = (i) => padL + i * step + step / 2;
          const yBar = (v) => padT + innerH - (v / maxDaily) * innerH;
          const yLine = (v) => padT + innerH - (v / maxCum) * innerH;
          const linePath = cum.map((v, i) => `${i === 0 ? 'M' : 'L'}${cx(i)},${yLine(v)}`).join(' ');
          const fmtAxis = (v) => {
            if (v >= 10000) { const m = v / 10000; return (Number.isInteger(m) ? m : m.toFixed(1)) + '万'; }
            if (v >= 1000) return Math.round(v / 1000) + '千';
            return String(Math.round(v));
          };
          const ticks = [0, 0.5, 1];
          return (
            <div className="chart-box">
              <div className="chart-title">日別売上・月間累計</div>
              <div className="chart-legend">
                <span className="lg"><span className="sw" style={{ background: 'var(--accent)' }}></span>日別売上（棒）</span>
                <span className="lg"><span className="sw" style={{ background: '#e67e22' }}></span>月間累計（線）</span>
                <span className="lg"><span className="sw" style={{ background: '#27ae60' }}></span>目標</span>
              </div>
              <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display: 'block' }}>
                  {ticks.map((f, i) => {
                    const gy = padT + innerH - f * innerH;
                    return (
                      <g key={i}>
                        <line x1={padL} y1={gy} x2={W - padR} y2={gy} stroke="var(--border)" strokeDasharray={f === 0 ? '' : '3,3'} />
                        <text x={padL - 4} y={gy + 3} textAnchor="end" fontSize="9" fill="var(--accent)">{fmtAxis(maxDaily * f)}</text>
                        <text x={W - padR + 4} y={gy + 3} textAnchor="start" fontSize="9" fill="#e67e22">{fmtAxis(maxCum * f)}</text>
                      </g>
                    );
                  })}
                  {daily.map((v, i) => v > 0 && (
                    <rect key={i} x={cx(i) - barW / 2} y={yBar(v)} width={barW} height={padT + innerH - yBar(v)} fill="var(--accent)" rx="2" />
                  ))}
                  <path d={linePath} fill="none" stroke="#e67e22" strokeWidth="2" />
                  {cum.map((v, i) => (
                    <circle key={i} cx={cx(i)} cy={yLine(v)} r="2.5" fill="#e67e22" />
                  ))}
                  {salesTarget > 0 && (() => {
                    const goalPath = Array.from({ length: dim }, (_, i) =>
                      `${i === 0 ? 'M' : 'L'}${cx(i)},${yLine(salesTarget / 30 * (i + 1))}`
                    ).join(' ');
                    const startY = yLine(salesTarget / 30 * 1);
                    return (
                      <g key="goal">
                        <path d={goalPath} fill="none" stroke="#27ae60" strokeWidth="1.5" strokeDasharray="5,3" />
                        <text x={padL + 2} y={startY - 3} fontSize="8" fill="#27ae60">目標</text>
                      </g>
                    );
                  })()}
                  {daily.map((v, i) => (
                    <text key={i} x={cx(i)} y={H - 7} textAnchor="middle" fontSize="9" fill="var(--muted)">{i + 1}</text>
                  ))}
                </svg>
            </div>
          );
        })()}
        </div>

        {days.length === 0
          ? <div className="empty-state" style={{background:'var(--card)',borderRadius:16,padding:32,color:'var(--muted)'}}>この月のデータはありません</div>
          : days.map(d => (
            <div key={d.date} className="day-card">
              <div className="day-card-header" onClick={() => setExpanded(expanded === d.date ? null : d.date)}>
                <span className="day-label">{d.date.replace(/-/g, '/')} ({['日','月','火','水','木','金','土'][new Date(d.date + 'T00:00:00+09:00').getDay()]})</span>
                <span className="day-total">{formatPrice(d.subtotal + d.extraTotal)}</span>
              </div>
              {expanded === d.date && (
                <div className="day-card-body">
                  {d.entries.map((e) => {
                    const c = calcEntry(e);
                    return (
                      <div key={e.id} className="day-entry-wrap">
                        <div className="day-entry">
                          <span>
                            {e.name}
                            {c.rate > 0 ? `（${e.lodging ? '宿泊' : ''}割引${Math.round(c.rate * 100)}%）` : ''}
                            {(e.extMin || 0) > 0 ? `（延長${e.extMin}分）` : ''}
                            {e.shimei ? '（指名）' : ''}
                            {e.seibetsu ? '（男女希望）' : ''}
                          </span>
                          <span className="de-price">{formatPrice(c.net)}</span>
                        </div>
                        {e.memo && <div className="day-entry-memo">📝 {e.memo}</div>}
                      </div>
                    );
                  })}
                  {d.discountAmount > 0 && (
                    <div className="day-entry day-discount">
                      <span>割引合計</span>
                      <span className="de-price">−{formatPrice(d.discountAmount)}</span>
                    </div>
                  )}
                  {d.extraTotal > 0 && (
                    <div className="day-entry">
                      <span>追加料金合計</span>
                      <span className="de-price">+{formatPrice(d.extraTotal)}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          ))
        }
      </>
    );
  }

  // ========== 確認タブ ==========
  function ConfirmTab({ userName }) {
    const admin = isAdminName(userName);
    const now = toJST();
    const [year, setYear] = useState(now.getUTCFullYear());
    const [month, setMonth] = useState(now.getUTCMonth() + 1);
    const [logs, setLogs] = useState([]);
    const [loading, setLoading] = useState(true);
    const [selected, setSelected] = useState(null);
    const [attInput, setAttInput] = useState('');
    const [savingAtt, setSavingAtt] = useState(false);

    useEffect(() => {
      setLoading(true);
      setSelected(null);
      const pad = (n) => String(n).padStart(2, '0');
      const start = `${year}${pad(month)}01`;
      const end = `${year}${pad(month)}31`;
      // リアルタイム購読：送信／未送信に戻した変更（✓・人数）を即時反映する
      const unsub = db.collection('submitLog')
        .where(firebase.firestore.FieldPath.documentId(), '>=', start)
        .where(firebase.firestore.FieldPath.documentId(), '<=', end)
        .onSnapshot(snap => {
          const result = snap.docs.map(d => ({
            id: d.id,
            names: (d.data().names || []),
            attendance: (typeof d.data().attendance === 'number' ? d.data().attendance : null),
          }));
          result.sort((a, b) => a.id.localeCompare(b.id));
          setLogs(result);
          setLoading(false);
        }, () => { setLogs([]); setLoading(false); });
      return () => unsub();
    }, [year, month]);

    const prevMonth = () => {
      if (month === 1) { setYear(y => y - 1); setMonth(12); }
      else setMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (month === 12) { setYear(y => y + 1); setMonth(1); }
      else setMonth(m => m + 1);
    };

    const WD = ['日','月','火','水','木','金','土'];

    // 日(1〜31) → 送信者名の配列 / 出勤人数
    const namesByDay = {};
    const attByDay = {};
    logs.forEach(l => {
      const d = parseInt(l.id.slice(6, 8), 10);
      namesByDay[d] = l.names;
      attByDay[d] = l.attendance;
    });

    // 選択日が変わったら、その日の出勤人数を入力欄へ反映（管理者の入力用）
    useEffect(() => {
      if (selected != null) setAttInput(attByDay[selected] != null ? String(attByDay[selected]) : '');
    }, [selected]);

    const pad2 = (n) => String(n).padStart(2, '0');
    const saveAttendance = async () => {
      if (selected == null) return;
      const id = `${year}${pad2(month)}${pad2(selected)}`;
      const n = attInput === '' ? null : Math.max(0, Math.floor(Number(attInput) || 0));
      setSavingAtt(true);
      try {
        await db.collection('submitLog').doc(id).set({ attendance: n }, { merge: true });
        setLogs(prev => {
          const idx = prev.findIndex(l => l.id === id);
          if (idx >= 0) { const next = prev.slice(); next[idx] = { ...next[idx], attendance: n }; return next; }
          return [...prev, { id, names: [], attendance: n }].sort((a, b) => a.id.localeCompare(b.id));
        });
      } finally { setSavingAtt(false); }
    };

    // カレンダーのセルを構築（日曜始まり〜土曜終わり）
    const daysInMonth = new Date(year, month, 0).getDate();
    const firstWd = new Date(year, month - 1, 1).getDay(); // 0=日
    const cells = [];
    for (let i = 0; i < firstWd; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);
    while (cells.length % 7 !== 0) cells.push(null);

    const selNames = selected != null ? (namesByDay[selected] || []) : null;
    const selAtt = selected != null && attByDay[selected] != null ? attByDay[selected] : null;

    return (
      <>
        <div className="confirm-fixed">
          <div className="month-header">
            <div className="month-nav">
              <button onClick={prevMonth}>‹</button>
              <span className="month-label">{year}年{month}月</span>
              <button onClick={nextMonth}>›</button>
            </div>
          </div>
          <div className="confirm-note">日付の数字は「提出人数／出勤人数」です。タップでその日の送信スタッフを表示します。送信済みの日は✓が入ります。</div>
        </div>

        {loading
          ? <div className="loading">読み込み中...</div>
          : <>
              <div className="cal-grid">
                {WD.map((w, i) => (
                  <div key={`wd${i}`} className={`cal-wd${i === 0 ? ' sun' : i === 6 ? ' sat' : ''}`}>{w}</div>
                ))}
                {cells.map((d, i) => {
                  if (d == null) return <div key={`c${i}`} className="cal-cell empty" />;
                  const wd = i % 7;
                  const names = namesByDay[d];
                  const count = names ? names.length : 0;
                  const att = attByDay[d] != null ? attByDay[d] : null;
                  const has = count > 0 || att != null;
                  const clickable = has || admin; // 管理者は空の日も選択して出勤人数を入力できる
                  const mine = !!(userName && names && names.includes(userName)); // 自分が送信済みか
                  const wdCls = wd === 0 ? ' sun' : wd === 6 ? ' sat' : '';
                  return (
                    <div
                      key={`c${i}`}
                      className={`cal-cell${has ? ' has' : ''}${selected === d ? ' selected' : ''}`}
                      onClick={clickable ? () => setSelected(s => s === d ? null : d) : undefined}
                    >
                      {mine && <span className="cal-mine">✓</span>}
                      <span className={`cal-daynum${wdCls}`}>{d}</span>
                      {has && <span className="cal-count">{count}/{att != null ? att : '−'}</span>}
                    </div>
                  );
                })}
              </div>

              {selected != null && (
                <div className="cal-panel">
                  <div className="confirm-head">
                    <span className="confirm-date">{month}月{selected}日（{WD[new Date(year, month - 1, selected).getDay()]}）</span>
                    <span className="confirm-count">提出{selNames.length}人／出勤{selAtt != null ? selAtt : '−'}人</span>
                  </div>
                  <div className="confirm-names">
                    {selNames.length === 0
                      ? <span className="confirm-empty">記録なし</span>
                      : selNames.map((n, i) => <span key={i} className="name-chip">{n}</span>)}
                  </div>
                  {admin && (
                    <div style={{display:'flex', alignItems:'center', gap:8, marginTop:10}}>
                      <label className="goal-label">出勤人数</label>
                      <input className="goal-input goal-input-sm" type="number" min="0"
                        value={attInput} onChange={e => setAttInput(e.target.value)} placeholder="" />
                      <span className="goal-unit">人</span>
                      <button className="goal-save-btn" style={{marginLeft:'auto'}} onClick={saveAttendance} disabled={savingAtt}>
                        {savingAtt ? '保存中' : '保存'}
                      </button>
                    </div>
                  )}
                </div>
              )}

              {logs.length === 0 && (
                <div className="confirm-note" style={{marginTop:12,textAlign:'center'}}>この月の送信記録はありません</div>
              )}
            </>
        }
      </>
    );
  }

  // ========== 提出タブ ==========
  // 提出用シートの並び：コース × 区分（日帰り定価／日帰り20%OFF／宿泊定価／宿泊10%OFF）
  const SUBMIT_TIERS = [
    { type: '日帰り', tier: '定価',    lodging: false, discount: false, rate: 0   },
    { type: '日帰り', tier: '20%OFF', lodging: false, discount: true,  rate: PRICING.discountRate.dayuse },
    { type: '宿泊',   tier: '定価',    lodging: true,  discount: false, rate: 0   },
    { type: '宿泊',   tier: '10%OFF', lodging: true,  discount: true,  rate: PRICING.discountRate.lodging },
  ];
  // 提出表示順（ボディケア=既定 → ストレッチ → タイ・バリ）を維持して PRICING から導出
  const EXT_UNITS = [
    ...PRICING.extUnits.filter(u => u.match.length === 0),
    ...PRICING.extUnits.filter(u => u.match.length > 0 && u.key !== 'bari' && u.key !== 'tai'),
  ].map(u => ({ key: u.key, label: u.label, unit: u.unit }));
  // タイ・バリ部門専用の延長行（バリ→タイの順で末尾に表示）
  const TAIBARI_EXT_UNITS = PRICING.extUnits
    .filter(u => u.key === 'bari' || u.key === 'tai')
    .map(u => ({ key: u.key, label: u.label, unit: u.unit }));
  // 追加料金行（男女希望／指名）— 全部門共通・割引なしの固定料金、日帰り／宿泊の2区分
  const FEE_ROWS = [
    { key: 'seibetsu',    label: '男女希望', fee: PRICING.fees.seibetsu },
    { key: 'shimei',      label: '指名',     fee: PRICING.fees.shimei },
  ];
  // タイ・バリ部門専用の追加料金行（眼精疲労）
  const TAIBARI_FEE_ROWS = [
    { key: 'ganseihirou', label: '眼精疲労15分', fee: PRICING.fees.ganseihirou },
  ];
  const FEE_TIERS = [
    { type: '日帰り', lodging: false },
    { type: '宿泊',   lodging: true  },
  ];

  function SubmitTab({ uid, userName, dept, setDept, viewDate, setViewDate }) {
    const now = toJST();
    const [year, setYear] = useState(now.getUTCFullYear());
    const [month, setMonth] = useState(now.getUTCMonth() + 1);
    const [entries, setEntries] = useState([]);
    const [presets, setPresets] = useState([]);
    const [loading, setLoading] = useState(true);
    const todayDay = (year === now.getUTCFullYear() && month === now.getUTCMonth() + 1)
      ? now.getUTCDate() : -1;
    const [selectedDay, setSelectedDay] = useState(() => now.getUTCDate());
    const [sending, setSending] = useState(false);
    const [sendResult, setSendResult] = useState(null);
    const [sendErrMsg, setSendErrMsg] = useState('');
    const [sentDates, setSentDates] = useState(new Set());

    // フッターの実高さを測定してスクロール領域の高さ計算に反映（Android で下が隠れる対策）
    const footerRef = useRef(null);
    useEffect(() => {
      const setFH = () => {
        if (footerRef.current) {
          document.documentElement.style.setProperty('--submit-footer-h', footerRef.current.offsetHeight + 'px');
        }
      };
      setFH();
      window.addEventListener('resize', setFH);
      return () => window.removeEventListener('resize', setFH);
    }, [loading, sendResult, sending, selectedDay, sentDates]);

    // viewDate（親から共有）が変わったら年月日を同期
    useEffect(() => {
      const dt = new Date(viewDate + 'T00:00:00Z');
      setYear(dt.getUTCFullYear());
      setMonth(dt.getUTCMonth() + 1);
      setSelectedDay(dt.getUTCDate());
    }, [viewDate]);

    // 送信済み日付をFirestoreから購読（端末間で同期）
    useEffect(() => {
      const ref = db.collection('users').doc(uid).collection('meta').doc('submitState');
      const unsub = ref.onSnapshot(snap => {
        const dates = (snap.exists && snap.data().dates) || [];
        setSentDates(new Set(dates));
      });
      return () => unsub();
    }, [uid]);

    // メニュー読み込み
    useEffect(() => {
      const ref = db.collection('users').doc(uid).collection('presets');
      ref.orderBy('createdAt').get().then(async snap => {
        if (snap.empty) {
          setPresets(DEFAULT_PRESETS);
          return;
        }
        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const removed = await removeObsoletePresets(uid, docs);
        const cleaned = docs.filter(d => !OBSOLETE_PRESET_NAMES.includes(d.name));
        const added = await syncMissingDefaultPresets(uid, cleaned);
        if (added || removed) {
          const snap2 = await ref.orderBy('createdAt').get();
          setPresets(snap2.docs.map(d => ({ id: d.id, ...d.data() })));
        } else {
          setPresets(cleaned);
        }
      });
    }, [uid]);

    // 選択月の全エントリ読み込み（日付つき）
    useEffect(() => {
      setLoading(true);
      const monthStr = `${year}-${String(month).padStart(2, '0')}`;
      const start = `${monthStr}-01`;
      const end = `${monthStr}-31`;
      db.collection('users').doc(uid).collection('days')
        .where(firebase.firestore.FieldPath.documentId(), '>=', start)
        .where(firebase.firestore.FieldPath.documentId(), '<=', end)
        .get()
        .then(async snap => {
          // 各日の entries を並列取得（逐次 await だと日数分の往復で遅くなるため）
          const perDay = await Promise.all(snap.docs.map(doc =>
            doc.ref.collection('entries').get().then(es => ({
              day: parseInt(doc.id.slice(8, 10), 10),
              docs: es.docs,
            }))
          ));
          const all = [];
          perDay.forEach(({ day, docs }) => {
            docs.forEach(d => all.push({ ...d.data(), _day: day }));
          });
          setEntries(all);
          setLoading(false);
        })
        .catch(() => { setEntries([]); setLoading(false); });
    }, [uid, year, month]);

    const prevMonth = () => {
      if (month === 1) { setYear(y => y - 1); setMonth(12); }
      else setMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (month === 12) { setYear(y => y + 1); setMonth(1); }
      else setMonth(m => m + 1);
    };

    const daysInMonth = new Date(year, month, 0).getDate();
    const dayList = Array.from({ length: daysInMonth }, (_, i) => i + 1);

    // 前日・翌日（月またぎ対応）— viewDate を更新し useEffect で年月日を同期
    const prevDay = () => {
      const dt = new Date(`${year}-${String(month).padStart(2,'0')}-${String(selectedDay).padStart(2,'0')}T00:00:00Z`);
      dt.setUTCDate(dt.getUTCDate() - 1);
      setViewDate(dt.toISOString().slice(0, 10));
    };
    const nextDay = () => {
      const dt = new Date(`${year}-${String(month).padStart(2,'0')}-${String(selectedDay).padStart(2,'0')}T00:00:00Z`);
      dt.setUTCDate(dt.getUTCDate() + 1);
      setViewDate(dt.toISOString().slice(0, 10));
    };
    const WD = ['日','月','火','水','木','金','土'];
    const selWd = WD[new Date(year, month - 1, selectedDay).getDay()];

    // メニュー名×区分×日 ごとの件数を集計
    const agg = {};
    entries.forEach(e => {
      const tierKey = e.lodging
        ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価')
        : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
      const al = aliasOf(e.name);
      const k = `${al.name}||${tierKey}`;
      if (!agg[k]) agg[k] = {};
      agg[k][e._day] = (agg[k][e._day] || 0) + al.qty;
    });
    const rowOf = (name, t) => agg[`${name}||${t.type}|${t.tier}`] || {};

    const groups = groupByCategory(presets);
    const deptNames = groups.map(g => g.category);
    const activeDept = deptNames.includes(dept) ? dept : (deptNames[0] || dept);
    const deptItems = (groups.find(g => g.category === activeDept) || { items: [] }).items;

    // フッター用：選択部門の日別合計金額
    // 日×メニュー×区分 ごとの金額集計
    const amountAgg = {};
    entries.forEach(e => {
      const tierKey = e.lodging
        ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価')
        : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
      const k = `${aliasOf(e.name).name}||${tierKey}`;
      if (!amountAgg[k]) amountAgg[k] = {};
      amountAgg[k][e._day] = (amountAgg[k][e._day] || 0) + calcEntry(e).net;
    });
    const dayAmounts = {};
    const dayAmountsNoDisc = {};
    const dayCountTotals = {};
    let deptTotalAmount = 0;
    let deptTotalNoDisc = 0;
    // 部門のメニュー名セット
    const deptMenuNames = new Set(deptItems.map(p => p.name));
    // 割引前総額（gross）の日別集計
    const grossAgg = {};
    entries.forEach(e => {
      if (!deptMenuNames.has(e.name)) return;
      const tierKey = e.lodging
        ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価')
        : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
      const k = `${aliasOf(e.name).name}||${tierKey}`;
      if (!grossAgg[k]) grossAgg[k] = {};
      grossAgg[k][e._day] = (grossAgg[k][e._day] || 0) + calcEntry(e).gross + calcEntry(e).extra;
    });
    deptItems.forEach(p => {
      SUBMIT_TIERS.forEach(t => {
        const tierKey = `${t.type}|${t.tier}`;
        const amtRow = amountAgg[`${p.name}||${tierKey}`] || {};
        const grossRow = grossAgg[`${p.name}||${tierKey}`] || {};
        const cntRow = rowOf(p.name, t);
        dayList.forEach(d => {
          if (amtRow[d]) {
            dayAmounts[d] = (dayAmounts[d] || 0) + amtRow[d];
            deptTotalAmount += amtRow[d];
          }
          if (grossRow[d]) {
            dayAmountsNoDisc[d] = (dayAmountsNoDisc[d] || 0) + grossRow[d];
            deptTotalNoDisc += grossRow[d];
          }
          if (cntRow[d]) { dayCountTotals[d] = (dayCountTotals[d] || 0) + cntRow[d]; }
        });
      });
    });

    const isTaiBariDept = activeDept === 'タイ・バリ';

    // 部門の表示行をスプレッドシート順に構築（メニュー群の直後に対応する延長行を常設）
    // タイ・バリ部門のみ、延長行を末尾にまとめて表示する（バリ→タイの順）
    const extByKey = {};
    EXT_UNITS.forEach(ex => { extByKey[ex.key] = ex; });
    // タイ・バリの初売りチケットは眼精疲労の後に表示するため、コース群からは除外する
    const isTicketMenu = (name) => (name || '').includes('初売りチケット');
    const taibariTickets = isTaiBariDept ? deptItems.filter(p => isTicketMenu(p.name)) : [];
    const submitRowList = [];
    deptItems.forEach((p, idx) => {
      if (isTaiBariDept && isTicketMenu(p.name)) return;
      if (isAliasMenu(p.name)) return; // 専用行は作らず、別メニューの本数へ折り込む
      submitRowList.push({ kind: 'menu', preset: p });
      if (isTaiBariDept) return;
      const curKey = extKeyFor(p.name);
      const nextKey = idx + 1 < deptItems.length ? extKeyFor(deptItems[idx + 1].name) : null;
      if (nextKey !== curKey && extByKey[curKey]) {
        submitRowList.push({ kind: 'ext', ex: extByKey[curKey] });
      }
    });

    // メニュー1件分の行（4区分）を描画する共通関数
    // 金額は単価×件数のみ（延長・指名等のオプションは別行で集計するため含めない）
    const renderMenuRows = (p) => SUBMIT_TIERS.map((t, i) => {
      const row = rowOf(p.name, t);
      const cnt = row[selectedDay] || 0;
      const tierPrice = t.tier === '20%OFF' ? Math.round(p.price * 0.8) : t.tier === '10%OFF' ? Math.round(p.price * 0.9) : p.price;
      const amt = cnt * tierPrice;
      return (
        <tr key={p.id + '-' + i} className={cnt === 0 ? 'zero' : ''}>
          {i === 0 && <td className="t-course sticky-col c1" rowSpan={SUBMIT_TIERS.length}>{p.name}</td>}
          <td className="t-type sticky-col c2">{t.type}{t.tier === '定価' ? '' : ' ' + t.tier}</td>
          <td className="sticky-col c3 col-price">{formatPrice(tierPrice)}</td>
          <td className="row-total">{cnt || ''}</td>
          <td className="row-total">{amt ? formatPrice(amt) : ''}</td>
        </tr>
      );
    });

    const handleEndOfDay = async () => {
      if (!window.GAS_ENDPOINT) {
        alert('GASのURLが設定されていません。index.html の GAS_ENDPOINT を設定してください。');
        return;
      }
      setSending(true);
      setSendResult(null);
      setSendErrMsg('');
      try {
        // 提出タブと同じ順序・形式でグループ化（延長行を含む）
        // 選択中の部門だけを送信する（例：ボディケア選択時はボディケアのみ）
        const groupsData = groups.filter(g => g.category === activeDept).map(g => {
          const gMenuNames = new Set(g.items.map(p => p.name));
          const regularItems = g.items.filter(p => !isAliasMenu(p.name)).flatMap(p =>
            SUBMIT_TIERS.map(t => {
              const tierLabel = t.type + (t.tier !== '定価' ? ' ' + t.tier : '');
              const tierKey = `${t.type}|${t.tier}`;
              const cnt = (agg[`${p.name}||${tierKey}`] || {})[selectedDay] || 0;
              const tierPrice = t.tier === '20%OFF' ? Math.round(p.price * 0.8) : t.tier === '10%OFF' ? Math.round(p.price * 0.9) : p.price;
              const amt = cnt * tierPrice;
              return { menu: p.name, tier: tierLabel, count: cnt, amount: amt };
            })
          );
          const isTaiBariG = g.category === 'タイ・バリ';
          const extUnitsForG = isTaiBariG ? TAIBARI_EXT_UNITS : EXT_UNITS;
          const extItems = extUnitsForG.flatMap(ex =>
            SUBMIT_TIERS.map(t => {
              const tierLabel = t.type + (t.tier !== '定価' ? ' ' + t.tier : '');
              let cnt = 0;
              entries.forEach(e => {
                if (e._day !== selectedDay) return;
                if (!gMenuNames.has(e.name)) return;
                if ((e.extMin || 0) === 0) return;
                if (extKeyFor(e.name) !== ex.key) return;
                if (e.lodging === t.lodging && e.discount === t.discount) cnt += e.extMin / 10;
              });
              return { menu: ex.label, tier: tierLabel, count: cnt, amount: 0 };
            })
          );
          const feeRowsForG = isTaiBariG ? [...TAIBARI_FEE_ROWS, ...FEE_ROWS] : FEE_ROWS;
          const feeItems = feeRowsForG.flatMap(fr =>
            FEE_TIERS.map(ft => {
              let cnt = 0;
              entries.forEach(e => {
                if (e._day !== selectedDay) return;
                if (!gMenuNames.has(e.name)) return;
                if (!e[fr.key]) return;
                if (!!e.lodging !== ft.lodging) return;
                cnt += 1;
              });
              return { menu: fr.label, tier: ft.type, count: cnt, amount: cnt * fr.fee };
            })
          );
          return { dept: g.category, items: [...regularItems, ...extItems, ...feeItems] };
        });

        const pad = (n) => String(n).padStart(2, '0');
        const payload = {
          userName,
          fileName: `${year}${pad(month)}${pad(selectedDay)}`,
          date: `${year}/${pad(month)}/${pad(selectedDay)}`,
          groups: groupsData,
          totalJ: dayAmounts[selectedDay] || 0,
          totalP: dayAmountsNoDisc[selectedDay] || 0,
        };

        // text/plain のまま（プリフライト回避）でレスポンスを読み、成否を判定する
        const resp = await fetch(window.GAS_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload),
        });
        let result = null;
        try { result = await resp.json(); } catch (e) { /* JSONでない＝失敗扱い */ }
        if (!resp.ok || !result || result.success !== true) {
          throw new Error((result && result.error) || `転記に失敗しました (status ${resp.status})`);
        }
        // 転記成功を確認できた場合のみ Firestore に送信済みを記録する
        await db.collection('users').doc(uid).collection('meta').doc('submitState')
          .set({ dates: firebase.firestore.FieldValue.arrayUnion(payload.fileName) }, { merge: true });
        // 全員が見られる共有送信記録（確認タブ用）
        if (userName) {
          await db.collection('submitLog').doc(payload.fileName)
            .set({ names: firebase.firestore.FieldValue.arrayUnion(userName) }, { merge: true });
        }
        setSendResult('success');
      } catch (err) {
        setSendResult('error');
        setSendErrMsg(err && err.message ? err.message : '送信に失敗しました');
      } finally {
        setSending(false);
      }
    };

    return (
      <>
        {sending && (
          <div className="sending-overlay">
            ⚠️ 送信中です。完了するまでアプリを閉じないでください...
          </div>
        )}
        <div className="day-nav">
          <button onClick={prevDay}>‹ 前日</button>
          <span className="day-label">{month}月{selectedDay}日（{selWd}）{selectedDay === todayDay ? ' 今日' : ''}</span>
          <button onClick={nextDay}>翌日 ›</button>
        </div>
        {selectedDay !== todayDay && (
          <div style={{textAlign:'center', marginBottom:8}}>
            <button className="today-back-btn" onClick={() => setViewDate(todayStr())}>今日に戻る</button>
          </div>
        )}

        {loading
          ? <div className="loading">読み込み中...</div>
          : (
            <div className="submit-scroll">
              <table className="submit-table">
                <thead>
                  <tr>
                    <th className="sticky-col c1">メニュー</th>
                    <th className="sticky-col c2">区分</th>
                    <th className="sticky-col c3">単価</th>
                    <th>件数</th>
                    <th>金額</th>
                  </tr>
                </thead>
                <tbody>
                  {submitRowList.map(rowItem => {
                    if (rowItem.kind === 'menu') {
                      return renderMenuRows(rowItem.preset);
                    }
                    const ex = rowItem.ex;
                    return SUBMIT_TIERS.map((t, i) => {
                      const tierKey = `${t.type}|${t.tier}`;
                      let cnt = 0;
                      entries.forEach(e => {
                        if (e._day !== selectedDay) return;
                        if (!deptMenuNames.has(e.name)) return;
                        if ((e.extMin || 0) === 0) return;
                        if (extKeyFor(e.name) !== ex.key) return;
                        const tk = e.lodging ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価') : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
                        if (tk !== tierKey) return;
                        cnt += e.extMin / 10;
                      });
                      const tierPrice = t.tier === '20%OFF' ? Math.round(ex.unit * 0.8) : t.tier === '10%OFF' ? Math.round(ex.unit * 0.9) : ex.unit;
                      const amt = cnt * tierPrice;
                      return (
                        <tr key={ex.label + '-' + i} className={cnt === 0 ? 'zero' : ''}>
                          {i === 0 && <td className="t-course sticky-col c1" rowSpan={SUBMIT_TIERS.length}>{ex.label}</td>}
                          <td className="t-type sticky-col c2">{t.type}{t.tier === '定価' ? '' : ' ' + t.tier}</td>
                          <td className="sticky-col c3 col-price">{formatPrice(tierPrice)}</td>
                          <td className="row-total">{cnt || ''}</td>
                          <td className="row-total">{amt ? formatPrice(amt) : ''}</td>
                        </tr>
                      );
                    });
                  })}
                  {deptItems.length === 0 && (
                    <tr><td className="t-type" colSpan={5}>この部門のメニューはありません</td></tr>
                  )}
                  {deptItems.length > 0 && isTaiBariDept && TAIBARI_FEE_ROWS.map(fr => (
                    FEE_TIERS.map((ft, i) => {
                      let cnt = 0;
                      entries.forEach(e => {
                        if (e._day !== selectedDay) return;
                        if (!deptMenuNames.has(e.name)) return;
                        if (!e[fr.key]) return;
                        if (!!e.lodging !== ft.lodging) return;
                        cnt += 1;
                      });
                      const amt = cnt * fr.fee;
                      return (
                        <tr key={fr.key + '-' + i} className={cnt === 0 ? 'zero' : ''}>
                          {i === 0 && <td className="t-course sticky-col c1" rowSpan={FEE_TIERS.length}>{fr.label}</td>}
                          <td className="t-type sticky-col c2">{ft.type}</td>
                          <td className="sticky-col c3 col-price">{formatPrice(fr.fee)}</td>
                          <td className="row-total">{cnt || ''}</td>
                          <td className="row-total">{amt ? formatPrice(amt) : ''}</td>
                        </tr>
                      );
                    })
                  ))}
                  {deptItems.length > 0 && isTaiBariDept && taibariTickets.map(p => renderMenuRows(p))}
                  {deptItems.length > 0 && isTaiBariDept && TAIBARI_EXT_UNITS.map(ex => (
                    SUBMIT_TIERS.map((t, i) => {
                      const tierKey = `${t.type}|${t.tier}`;
                      let cnt = 0;
                      entries.forEach(e => {
                        if (e._day !== selectedDay) return;
                        if (!deptMenuNames.has(e.name)) return;
                        if ((e.extMin || 0) === 0) return;
                        if (extKeyFor(e.name) !== ex.key) return;
                        const tk = e.lodging ? (e.discount ? '宿泊|10%OFF' : '宿泊|定価') : (e.discount ? '日帰り|20%OFF' : '日帰り|定価');
                        if (tk !== tierKey) return;
                        cnt += e.extMin / 10;
                      });
                      const tierPrice = t.tier === '20%OFF' ? Math.round(ex.unit * 0.8) : t.tier === '10%OFF' ? Math.round(ex.unit * 0.9) : ex.unit;
                      const amt = cnt * tierPrice;
                      return (
                        <tr key={ex.key + '-' + i} className={cnt === 0 ? 'zero' : ''}>
                          {i === 0 && <td className="t-course sticky-col c1" rowSpan={SUBMIT_TIERS.length}>{ex.label}</td>}
                          <td className="t-type sticky-col c2">{t.type}{t.tier === '定価' ? '' : ' ' + t.tier}</td>
                          <td className="sticky-col c3 col-price">{formatPrice(tierPrice)}</td>
                          <td className="row-total">{cnt || ''}</td>
                          <td className="row-total">{amt ? formatPrice(amt) : ''}</td>
                        </tr>
                      );
                    })
                  ))}
                  {deptItems.length > 0 && FEE_ROWS.map(fr => (
                    FEE_TIERS.map((ft, i) => {
                      let cnt = 0;
                      entries.forEach(e => {
                        if (e._day !== selectedDay) return;
                        if (!deptMenuNames.has(e.name)) return;
                        if (!e[fr.key]) return;
                        if (!!e.lodging !== ft.lodging) return;
                        cnt += 1;
                      });
                      const amt = cnt * fr.fee;
                      return (
                        <tr key={fr.key + '-' + i} className={cnt === 0 ? 'zero' : ''}>
                          {i === 0 && <td className="t-course sticky-col c1" rowSpan={FEE_TIERS.length}>{fr.label}</td>}
                          <td className="t-type sticky-col c2">{ft.type}</td>
                          <td className="sticky-col c3 col-price">{formatPrice(fr.fee)}</td>
                          <td className="row-total">{cnt || ''}</td>
                          <td className="row-total">{amt ? formatPrice(amt) : ''}</td>
                        </tr>
                      );
                    })
                  ))}
                </tbody>
              </table>
            </div>
          )
        }

        {(() => {
          const pad = (n) => String(n).padStart(2, '0');
          const dateKey = `${year}${pad(month)}${pad(selectedDay)}`;
          const isSent = sentDates.has(dateKey);
          return (
            <div className="submit-footer" ref={footerRef}>
              <div className="day-totals">
                <span>割引合計（J）<b>{formatPrice(dayAmounts[selectedDay] || 0)}</b></span>
                <span>合計（P）<b>{formatPrice(dayAmountsNoDisc[selectedDay] || 0)}</b></span>
              </div>
              <div className="end-of-day-row">
                <span className={`send-status ${isSent ? 'sent' : 'unsent'}`}>
                  {isSent ? '送信済' : '未送信'}
                </span>
                <button className={`end-of-day-btn${isSent ? ' sent' : ''}`} onClick={handleEndOfDay} disabled={sending}>
                  {sending ? '送信中...' : isSent ? `訂正送信（${month}/${selectedDay}）` : `業務終了（${month}/${selectedDay}）`}
                </button>
                <span className="send-caution">指示なく前日より前のデータを訂正する場合は責任者に連絡をしてください。</span>
              </div>
              {sendResult && (
                <div className={`send-result ${sendResult}`}>
                  {sendResult === 'success'
                    ? 'スプレッドシートに転記しました ✓'
                    : `送信に失敗しました。再度お試しください。${sendErrMsg ? '（' + sendErrMsg + '）' : ''}`}
                </div>
              )}
            </div>
          );
        })()}
      </>
    );
  }

  // マウント
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
