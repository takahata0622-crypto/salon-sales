<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サロン売上管理</title>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #F7F3EE;
      --card: #FFFFFF;
      --ink: #1A1714;
      --accent: #9B6A4A;
      --accent-light: #F3EAE0;
      --muted: #8A7F76;
      --border: #E5DDD5;
      --danger: #C0392B;
      --success: #2E7D5E;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header .version {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 0;
      background: var(--accent-light);
      border-radius: 10px;
      padding: 3px;
      margin: 16px 16px 0;
    }

    .tab {
      flex: 1;
      padding: 8px 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      background: none;
      border: none;
    }

    .tab.active {
      background: var(--card);
      color: var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .main { padding: 16px; }

    /* 今日の売上 */
    .today-total {
      background: var(--accent);
      color: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }

    .today-total .label {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .today-total .amount {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .today-total .count {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 4px;
    }

    .today-total .discount-line {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 6px;
      background: rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 4px 8px;
      display: inline-block;
    }

    /* 内訳ヘッダ・宿泊割引トグル */
    .entry-list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .entry-list-head h2 {
      padding: 0;
      border: none;
    }

    .toggle-btns { display: flex; gap: 8px; }

    .toggle-btn {
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn.active {
      color: white;
      background: var(--accent);
      border-color: var(--accent);
    }

    .day-discount { color: var(--danger); font-weight: 600; }
    .day-discount .de-price { color: var(--danger); }

    /* コース追加 */
    .add-section {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;

    .add-section h2 {

    .preset-grid {
      display: grid;

    .preset-btn {

    .custom-input-row input {

      font-size: 14px;
      font-weight: 600;

    /* 今日のリスト */
    .entry-list {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .entry-list h2 {
      font-size: 14px;

      color: var(--muted);

    .entry-item {

    .entry-item:last-child { border-bottom: none; }

    .entry-main {

    .entry-toggles {

    .entry-orig {

    .entry-disc-note {

      border: 1px solid var(--border);

    .day-card-header {

    .day-card-header .day-label {

    /* プリセット管理 */

    .preset-item .pi-name { font-size: 14px; font-weight: 500; }
    .preset-item .pi-price { font-size: 13px; color: var(--muted); }

    .new-preset-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;

    .new-preset-row input {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      background: var(--bg);
      color: var(--ink);

    .new-preset-row button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;

    /* 大分類・編集UI */

    .dept-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;

    .dept-tab {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);

      cursor: pointer;

    .dept-tab.active {
      color: var(--accent);
      background: var(--card);

    .edit-link, .del-link {

      border-radius: 8px;

    .sample-tag {

    .preset-item.editing {

    .edit-fields { display: flex; flex-direction: column; gap: 8px; }

    .edit-fields input, .edit-row2 select, .new-preset-row2 select {

      background: var(--bg);

    }

    .edit-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .edit-actions { display: flex; gap: 8px; }

    .save-btn, .cancel-btn {
      flex: 1;

    }

    .save-btn { background: var(--accent); color: white; border-color: var(--accent); }

    .hint {

    .new-preset-section {

    .new-preset-row2 {
      display: grid;

    .new-preset-row2 button {

    }

    .reset-section {

      padding-top: 14px;

    .reset-btn {
      width: 100%;
      background: var(--card);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .reset-note {
      font-size: 11px;
      color: var(--muted);

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
  </style>
</head>

<div id="root"></div>

<script>
  window.FIREBASE_CONFIG = {
    apiKey: "AIzaSyBeYk5Jv4aDV9VuCfVjKu_rB65uM16spUE",

<script type="text/babel">
  const { useState, useEffect, useCallback } = React;

  // Firebase 初期化
  firebase.initializeApp(window.FIREBASE_CONFIG);
  const db = firebase.firestore();
  const auth = firebase.auth();

  // 日付ユーティリティ
  const toJST = (date = new Date()) => {
    const jst = new Date(date.getTime() + 9 * 60 * 60 * 1000);
    return jst;
  };

  const todayStr = () => {
    const d = toJST();
    return d.toISOString().slice(0, 10); // YYYY-MM-DD
  };

  const formatPrice = (n) => `¥${n.toLocaleString()}`;

  const formatTime = (ts) => {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    return jst.toISOString().slice(11, 16);
  };

  // 延長10分あたりの単価（メニュー種別ごと）
  const extUnitFor = (name) => {
    const n = name || '';
    if (n.includes('ストレッチ')) return 1500;
    if (n.includes('タイ古式') || n.includes('バリアロマ')) return 2000;
    return 1350;
  };
  // 1件の金額内訳を計算（今日タブ・集計タブ共通）
  const calcEntry = (e) => {
    const ext = ((e.extMin || 0) / 10) * extUnitFor(e.name);
    const gross = e.price + ext;
    const rate = e.discount ? (e.lodging ? 0.10 : 0.20) : 0;
    const discount = Math.round(gross * rate);
    const extra = (e.shimei ? 500 : 0) + (e.seibetsu ? 300 : 0);
    const net = gross - discount + extra;
    return { ext, gross, rate, discount, extra, net };
  };

  const CATEGORIES = ['ボディケア', 'タイ・バリ'];
  const UNCATEGORIZED = 'その他';

  const DEFAULT_PRESETS = [
    // ボディケア
    { id: 'p1', name: 'ボディケア40分', price: 5000, category: 'ボディケア', isDefault: true },
    { id: 'p2', name: 'ボディケア60分', price: 7600, category: 'ボディケア', isDefault: true },
    { id: 'p3', name: 'ボディケア80分', price: 10000, category: 'ボディケア', isDefault: true },
    { id: 'p4', name: 'セレクトボディケア60分', price: 7800, category: 'ボディケア', isDefault: true },
    { id: 'p5', name: 'セレクトボディケア80分', price: 10400, category: 'ボディケア', isDefault: true },
    { id: 'p6', name: 'セレクトボディケア100分', price: 13000, category: 'ボディケア', isDefault: true },
    { id: 'p7', name: 'セレクトボディケア120分', price: 15600, category: 'ボディケア', isDefault: true },
    { id: 'p8', name: '部分集中30分', price: 4500, category: 'ボディケア', isDefault: true },
    { id: 'p10', name: 'ストレッチ40分', price: 5500, category: 'ボディケア', isDefault: true },
    { id: 'p11', name: 'ストレッチ60分', price: 7800, category: 'ボディケア', isDefault: true },
    { id: 'p12', name: 'ストレッチ90分', price: 11000, category: 'ボディケア', isDefault: true },
    // タイ・バリ
    { id: 'p14', name: 'タイ古式60分', price: 8000, category: 'タイ・バリ', isDefault: true },
    { id: 'p15', name: 'タイ古式70分', price: 8500, category: 'タイ・バリ', isDefault: true },
    { id: 'p16', name: 'タイ古式90分', price: 11500, category: 'タイ・バリ', isDefault: true },
    { id: 'p17', name: 'タイ古式120分', price: 14500, category: 'タイ・バリ', isDefault: true },
    { id: 'p18', name: 'バリアロマ40分', price: 7000, category: 'タイ・バリ', isDefault: true },
    { id: 'p19', name: 'バリアロマ60分', price: 9800, category: 'タイ・バリ', isDefault: true },
    { id: 'p20', name: 'バリアロマ70分', price: 10000, category: 'タイ・バリ', isDefault: true },
    { id: 'p21', name: 'バリアロマ90分', price: 14000, category: 'タイ・バリ', isDefault: true },
    { id: 'p22', name: 'バリアロマ120分', price: 18000, category: 'タイ・バリ', isDefault: true },
  ];

  // プリセットを大分類ごとにグループ化（CATEGORIES の順 → その他 → 独自分類）
  const groupByCategory = (presets) => {
    const order = [...CATEGORIES, UNCATEGORIZED];
    const seen = new Set();
    const groups = [];
    const push = (cat) => {
      if (seen.has(cat)) return;
      const items = presets.filter(p => (p.category || UNCATEGORIZED) === cat);
      if (items.length) { groups.push({ category: cat, items }); seen.add(cat); }
    };
    order.forEach(push);
    presets.forEach(p => push(p.category || UNCATEGORIZED));
    return groups;
  };

  // 初期メニューを Firestore に一括登録（編集・削除できる実データとして保存）
  const seedDefaultPresets = async (uid) => {
    const col = db.collection('users').doc(uid).collection('presets');
    const base = Date.now();
    const batch = db.batch();
    DEFAULT_PRESETS.forEach((m, i) => {
      batch.set(col.doc(), {
        name: m.name,
        price: m.price,
        category: m.category,
        createdAt: base + i
      });
    });
    await batch.commit();
  };

  // ==================== コンポーネント ====================

  // 大部門の切り替えタブ
  function DeptTabs({ depts, value, onChange }) {
    if (depts.length <= 1) return null;
    return (
      <div className="dept-tabs">
        {depts.map(d => (
          <button
            key={d}
            className={`dept-tab ${value === d ? 'active' : ''}`}
            onClick={() => onChange(d)}
          >{d}</button>
        ))}
      </div>
    );
  }

  function App() {
    const [tab, setTab] = useState('today');
    const [uid, setUid] = useState(null);
    const [loading, setLoading] = useState(true);

    useEffect(() => {
      // 匿名ログイン → 初回はメニューを自動登録
      auth.signInAnonymously().then(async result => {
        const u = result.user.uid;
        try {
          const col = db.collection('users').doc(u).collection('presets');
          const snap = await col.limit(1).get();
          if (snap.empty) {
            await seedDefaultPresets(u);
          }
        } catch (e) {
          console.error('seed error', e);
        }
        setUid(u);
        setLoading(false);
      }).catch(err => {
        console.error(err);
        setLoading(false);
      });
    }, []);

    if (loading) return <div className="loading">読み込み中...</div>;
    if (!uid) return <div className="loading">エラーが発生しました</div>;

    return (
      <>
        <header>
          <h1>💄 サロン売上管理</h1>
          <span className="version">Ver 1.12</span>
        </header>

        <div className="tabs">
          <button className={`tab ${tab === 'today' ? 'active' : ''}`} onClick={() => setTab('today')}>今日</button>
          <button className={`tab ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>集計</button>
          <button className={`tab ${tab === 'settings' ? 'active' : ''}`} onClick={() => setTab('settings')}>設定</button>
        </div>

        <div className="main">
          {tab === 'today' && <TodayTab uid={uid} />}
          {tab === 'history' && <HistoryTab uid={uid} />}
          {tab === 'settings' && <SettingsTab uid={uid} />}
        </div>
      </>
    );
  }

  // ========== 今日タブ ==========
  function TodayTab({ uid }) {
    const [entries, setEntries] = useState([]);
    const [presets, setPresets] = useState([]);
    const [dept, setDept] = useState(CATEGORIES[0]);
    const [customName, setCustomName] = useState('');
    const [customPrice, setCustomPrice] = useState('');
    const today = todayStr();

    // プリセット読み込み
    useEffect(() => {
      const ref = db.collection('users').doc(uid).collection('presets');
      ref.orderBy('createdAt').get().then(snap => {
        if (snap.empty) {
          setPresets(DEFAULT_PRESETS);
        } else {
          setPresets(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }
      });
    }, [uid]);

    // 今日のエントリ購読
    useEffect(() => {
      const ref = db.collection('users').doc(uid)
        .collection('days').doc(today)
        .collection('entries')
        .orderBy('createdAt', 'asc');

      const unsub = ref.onSnapshot(snap => {
        setEntries(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
      return () => unsub();
    }, [uid, today]);

    const dayRef = () => db.collection('users').doc(uid).collection('days').doc(today);

    const addEntry = async (name, price) => {
      if (!name || !price) return;
      // 親ドキュメントを作成（集計で日付が拾えるように）
      await dayRef().set({ date: today }, { merge: true });
      await dayRef().collection('entries')
        .add({ name, price: Number(price), lodging: false, discount: false, extMin: 0, shimei: false, seibetsu: false, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    };

    const toggleEntryLodging = (e) =>
      dayRef().collection('entries').doc(e.id).update({ lodging: !e.lodging });
    const toggleEntryDiscount = (e) =>
      dayRef().collection('entries').doc(e.id).update({ discount: !e.discount });
    // 延長を 0→10→20→30→0 で循環
    const cycleEntryExt = (e) =>
      dayRef().collection('entries').doc(e.id).update({ extMin: ((e.extMin || 0) + 10) % 40 });
    const toggleEntryShimei = (e) =>
      dayRef().collection('entries').doc(e.id).update({ shimei: !e.shimei });
    const toggleEntrySeibetsu = (e) =>
      dayRef().collection('entries').doc(e.id).update({ seibetsu: !e.seibetsu });

    const deleteEntry = async (id) => {
      await dayRef().collection('entries').doc(id).delete();
    };

    const handleCustomAdd = () => {
      const p = parseInt(customPrice.replace(/,/g, ''), 10);
      if (!customName.trim() || isNaN(p) || p <= 0) return;
      addEntry(customName.trim(), p);
      setCustomName('');
      setCustomPrice('');
    };

    const extAmount = (e) => calcEntry(e).ext;
    const entryGross = (e) => calcEntry(e).gross;
    const entryRate = (e) => calcEntry(e).rate;
    const entryNet = (e) => calcEntry(e).net;

    const subtotal = entries.reduce((s, e) => s + calcEntry(e).gross, 0);
    const discountAmount = entries.reduce((s, e) => s + calcEntry(e).discount, 0);
    const extraTotal = entries.reduce((s, e) => s + calcEntry(e).extra, 0);
    const total = subtotal - discountAmount + extraTotal;

    const groups = groupByCategory(presets);
    const deptNames = groups.map(g => g.category);
    const activeDept = deptNames.includes(dept) ? dept : (deptNames[0] || dept);
    const deptItems = (groups.find(g => g.category === activeDept) || { items: [] }).items;

    return (
      <>
        {/* 合計 */}
        <div className="today-total">
          <div className="label">{today.replace(/-/g, '/')} の売上</div>
          <div className="amount">{formatPrice(total)}</div>
          {(discountAmount > 0 || extraTotal > 0) && (
            <div className="discount-line">
              小計 {formatPrice(subtotal)}
              {discountAmount > 0 && <>　割引 −{formatPrice(discountAmount)}</>}
              {extraTotal > 0 && <>　追加 +{formatPrice(extraTotal)}</>}
            </div>
          )}
          <div className="count">{entries.length} 件</div>
        </div>

        {/* コース追加 */}
        <div className="add-section">
          <h2>メニューを追加</h2>
          <DeptTabs depts={deptNames} value={activeDept} onChange={setDept} />
          <div className="preset-grid">
            {deptItems.map(p => (
              <button key={p.id} className="preset-btn" onClick={() => addEntry(p.name, p.price)}>
                <span className="course-name">{p.name}</span>
                <span className="course-price">{formatPrice(p.price)}</span>
              </button>
            ))}
          </div>

          {/* カスタム */}
          <div className="custom-input-row">
            <input
              placeholder="コース名"
              value={customName}
              onChange={e => setCustomName(e.target.value)}
            />
            <input
              placeholder="金額"
              inputMode="numeric"
              value={customPrice}
              onChange={e => setCustomPrice(e.target.value)}
              style={{ width: 100 }}
            />
            <button className="add-btn" onClick={handleCustomAdd}>追加</button>
          </div>
        </div>

        {/* 今日のリスト */}
        <div className="entry-list">
          <h2>内訳</h2>
          {entries.length === 0
            ? <div className="empty-state">まだ入力がありません</div>
            : entries.map(e => (
              <div key={e.id} className="entry-item">
                <div className="entry-main">
                  <div className="entry-info">
                    <div className="entry-name">{e.name}</div>
                    <div className="entry-time">{formatTime(e.createdAt)}</div>
                  </div>
                  <div className="entry-right">
                    {entryRate(e) > 0 && <span className="entry-orig">{formatPrice(entryGross(e))}</span>}
                    <span className="entry-price">{formatPrice(entryNet(e))}</span>
                    <button className="delete-btn" onClick={() => deleteEntry(e.id)}>✕</button>
                  </div>
                </div>
                <div className="entry-toggles">
                  <button className={`toggle-btn sm ${(e.extMin || 0) > 0 ? 'active' : ''}`} onClick={() => cycleEntryExt(e)}>延長{e.extMin || 0}分</button>
                  <button className={`toggle-btn sm ${e.lodging ? 'active' : ''}`} onClick={() => toggleEntryLodging(e)}>宿泊</button>
                  <button className={`toggle-btn sm ${e.discount ? 'active' : ''}`} onClick={() => toggleEntryDiscount(e)}>割引</button>
                  <button className={`toggle-btn sm ${e.shimei ? 'active' : ''}`} onClick={() => toggleEntryShimei(e)}>指名料</button>
                  <button className={`toggle-btn sm ${e.seibetsu ? 'active' : ''}`} onClick={() => toggleEntrySeibetsu(e)}>男女希望</button>
                  {(e.extMin || 0) > 0 && <span className="entry-disc-note">延長+{formatPrice(extAmount(e))}</span>}
                  {entryRate(e) > 0 && <span className="entry-disc-note">{Math.round(entryRate(e) * 100)}%オフ</span>}
                  {e.shimei && <span className="entry-disc-note" style={{color:'var(--text)'}}>指名+500</span>}
                  {e.seibetsu && <span className="entry-disc-note" style={{color:'var(--text)'}}>希望+300</span>}
                </div>
              </div>
            ))
          }
        </div>
      </>
    );
  }

  // ========== 集計タブ ==========
  function HistoryTab({ uid }) {
    const now = toJST();
    const [year, setYear] = useState(now.getUTCFullYear());
    const [month, setMonth] = useState(now.getUTCMonth() + 1);
    const [days, setDays] = useState([]);
    const [expanded, setExpanded] = useState(null);
    const [editing, setEditing] = useState(false);

    const load = React.useCallback(() => {
      const monthStr = `${year}-${String(month).padStart(2, '0')}`;
      const start = `${monthStr}-01`;
      const end = `${monthStr}-31`;

      db.collection('users').doc(uid).collection('days')
        .where(firebase.firestore.FieldPath.documentId(), '>=', start)
        .where(firebase.firestore.FieldPath.documentId(), '<=', end)
        .get()
        .then(async snap => {
          const result = [];
          for (const doc of snap.docs) {
            const entriesSnap = await doc.ref.collection('entries').orderBy('createdAt', 'asc').get();
            const entries = entriesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            if (entries.length === 0) continue; // エントリのない日は集計しない
            const subtotal = entries.reduce((s, e) => s + calcEntry(e).gross, 0);
            const discountAmount = entries.reduce((s, e) => s + calcEntry(e).discount, 0);
            const extraTotal = entries.reduce((s, e) => s + calcEntry(e).extra, 0);
            const total = subtotal - discountAmount + extraTotal;
            result.push({ date: doc.id, entries, subtotal, discountAmount, extraTotal, total });
          }
          result.sort((a, b) => b.date.localeCompare(a.date));
          setDays(result);
        });
    }, [uid, year, month]);

    useEffect(() => { load(); }, [load]);

    // 過去の項目を編集する関数群
    const entryRef = (date, id) =>
      db.collection('users').doc(uid).collection('days').doc(date).collection('entries').doc(id);
    const updateEntry = async (date, id, data) => {
      await entryRef(date, id).update(data);
      load();
    };
    const removeEntry = async (date, id) => {
      if (!window.confirm('この項目を削除しますか？')) return;
      await entryRef(date, id).delete();
      load();
    };

    const prevMonth = () => {
      if (month === 1) { setYear(y => y - 1); setMonth(12); }
      else setMonth(m => m - 1);
    };
    const nextMonth = () => {
      if (month === 12) { setYear(y => y + 1); setMonth(1); }
      else setMonth(m => m + 1);
    };

    const monthTotal = days.reduce((s, d) => s + d.total, 0);
    const dayCount = days.length;

    return (
      <>
        <div className="month-header">
          <div className="month-nav">
            <button onClick={prevMonth}>‹</button>
            <span className="month-label">{year}年{month}月</span>
            <button onClick={nextMonth}>›</button>
          </div>
          <button className={`edit-toggle ${editing ? 'active' : ''}`} onClick={() => setEditing(v => !v)}>
            {editing ? '編集を終了' : '編集'}
          </button>
        </div>

        <div className="month-summary">
          <div>
            <div className="stat-label">月間売上</div>
            <div className="stat-value">{formatPrice(monthTotal)}</div>
          </div>
          <div>
            <div className="stat-label">営業日数</div>
            <div className="stat-value">{dayCount}日</div>
          </div>
          <div>
            <div className="stat-label">1日平均</div>
            <div className="stat-value">{dayCount ? formatPrice(Math.round(monthTotal / dayCount)) : '—'}</div>
          </div>
        </div>

        {days.length === 0
          ? <div className="empty-state" style={{background:'var(--card)',borderRadius:16,padding:32,color:'var(--muted)'}}>この月のデータはありません</div>
          : days.map(d => (
            <div key={d.date} className="day-card">
              <div className="day-card-header" onClick={() => setExpanded(expanded === d.date ? null : d.date)}>
                <span className="day-label">{d.date.replace(/-/g, '/')} ({['日','月','火','水','木','金','土'][new Date(d.date + 'T00:00:00+09:00').getDay()]})</span>
                <span className="day-total">{formatPrice(d.total)}</span>
              </div>
              {expanded === d.date && (
                <div className="day-card-body">
                  {d.entries.map((e) => {
                    const c = calcEntry(e);
                    return (
                      <div key={e.id} className="day-entry-block">
                        <div className="day-entry">
                          <span>
                            {e.name}
                            {c.rate > 0 ? `（${e.lodging ? '宿泊' : ''}割引${Math.round(c.rate * 100)}%）` : ''}
                            {(e.extMin || 0) > 0 ? `（延長${e.extMin}分）` : ''}
                            {e.shimei ? '（指名）' : ''}
                            {e.seibetsu ? '（男女希望）' : ''}
                          </span>
                          <span className="de-price">{formatPrice(c.net)}</span>
                        </div>
                        {editing && (
                          <div className="entry-toggles">
                            <button className={`toggle-btn sm ${(e.extMin || 0) > 0 ? 'active' : ''}`} onClick={() => updateEntry(d.date, e.id, { extMin: ((e.extMin || 0) + 10) % 40 })}>延長{e.extMin || 0}分</button>
                            <button className={`toggle-btn sm ${e.lodging ? 'active' : ''}`} onClick={() => updateEntry(d.date, e.id, { lodging: !e.lodging })}>宿泊</button>
                            <button className={`toggle-btn sm ${e.discount ? 'active' : ''}`} onClick={() => updateEntry(d.date, e.id, { discount: !e.discount })}>割引</button>
                            <button className={`toggle-btn sm ${e.shimei ? 'active' : ''}`} onClick={() => updateEntry(d.date, e.id, { shimei: !e.shimei })}>指名料</button>
                            <button className={`toggle-btn sm ${e.seibetsu ? 'active' : ''}`} onClick={() => updateEntry(d.date, e.id, { seibetsu: !e.seibetsu })}>男女希望</button>
                            <button className="delete-btn" onClick={() => removeEntry(d.date, e.id)}>✕</button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  {d.discountAmount > 0 && (
                    <div className="day-entry day-discount">
                      <span>割引合計</span>
                      <span className="de-price">−{formatPrice(d.discountAmount)}</span>
                    </div>
                  )}
                  {d.extraTotal > 0 && (
                    <div className="day-entry">
                      <span>追加料金合計</span>
                      <span className="de-price">+{formatPrice(d.extraTotal)}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          ))
        }
      </>
    );
  }

  // ========== 設定タブ ==========
  function SettingsTab({ uid }) {
    const [presets, setPresets] = useState([]);
    const [dept, setDept] = useState(CATEGORIES[0]);
    const [newName, setNewName] = useState('');
    const [newPrice, setNewPrice] = useState('');
    const [newCategory, setNewCategory] = useState(CATEGORIES[0]);
    const [editingId, setEditingId] = useState(null);
    const [editName, setEditName] = useState('');
    const [editPrice, setEditPrice] = useState('');
    const [editCategory, setEditCategory] = useState(CATEGORIES[0]);

    const loadPresets = useCallback(() => {
      db.collection('users').doc(uid).collection('presets')
        .orderBy('createdAt').get().then(snap => {
          if (snap.empty) {
            setPresets(DEFAULT_PRESETS);
          } else {
            setPresets(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          }
        });
    }, [uid]);

    useEffect(() => { loadPresets(); }, [loadPresets]);

    const addPreset = async () => {
      const p = parseInt(String(newPrice).replace(/,/g, ''), 10);
      if (!newName.trim() || isNaN(p) || p <= 0) {
        alert('メニュー名と金額（1以上の数字）を入力してください');
        return;
      }
      try {
        await db.collection('users').doc(uid).collection('presets').add({
          name: newName.trim(),
          price: p,
          category: newCategory,
          createdAt: Date.now()
        });
        setNewName('');
        setNewPrice('');
        loadPresets();
      } catch (e) {
        console.error(e);
        alert('追加に失敗しました：' + (e && e.message ? e.message : e));
      }
    };

    const startEdit = (p) => {
      setEditingId(p.id);
      setEditName(p.name);
      setEditPrice(String(p.price));
      setEditCategory(p.category || CATEGORIES[0]);
    };

    const cancelEdit = () => setEditingId(null);

    const saveEdit = async (p) => {
      const price = parseInt(String(editPrice).replace(/,/g, ''), 10);
      if (!editName.trim() || isNaN(price) || price <= 0) {
        alert('メニュー名と金額（1以上の数字）を入力してください');
        return;
      }
      try {
        await db.collection('users').doc(uid).collection('presets').doc(p.id).update({
          name: editName.trim(),
          price,
          category: editCategory
        });
        setEditingId(null);
        loadPresets();
      } catch (e) {
        console.error(e);
        alert('保存に失敗しました：' + (e && e.message ? e.message : e));
      }
    };

    const deletePreset = async (p) => {
      if (!window.confirm(`「${p.name}」を削除しますか？`)) return;
      try {
        await db.collection('users').doc(uid).collection('presets').doc(p.id).delete();
        loadPresets();
      } catch (e) {
        console.error(e);
        alert('削除に失敗しました：' + (e && e.message ? e.message : e));
      }
    };

    const loadDefaultMenu = async () => {
      if (!window.confirm('現在のメニューをすべて削除して、初期メニュー（ボディケア／タイ・バリ）を登録します。よろしいですか？')) return;
      try {
        const col = db.collection('users').doc(uid).collection('presets');
        const snap = await col.get();
        if (!snap.empty) {
          const delBatch = db.batch();
          snap.docs.forEach(d => delBatch.delete(d.ref));
          await delBatch.commit();
        }
        await seedDefaultPresets(uid);
        loadPresets();
        alert('初期メニューを登録しました');
      } catch (e) {
        console.error(e);
        alert('読み込みに失敗しました：' + (e && e.message ? e.message : e));
      }
    };

    const usingDefaults = presets.length > 0 && presets.every(p => p.isDefault);

    const groups = groupByCategory(presets);
    const deptNames = groups.map(g => g.category);
    const activeDept = deptNames.includes(dept) ? dept : (deptNames[0] || dept);
    const deptItems = (groups.find(g => g.category === activeDept) || { items: [] }).items;
    const onDeptChange = (d) => { setDept(d); setNewCategory(d); setEditingId(null); };

    return (
      <div className="manage-section">
        <h2>メニュー管理</h2>

        {usingDefaults && (
          <div className="hint">下記は初期サンプルです。「メニューを追加」から登録すると、編集・削除できるようになります。</div>
        )}

        <DeptTabs depts={deptNames} value={activeDept} onChange={onDeptChange} />

        <div className="preset-group">
          {deptItems.map(p => (
              editingId === p.id ? (
                <div key={p.id} className="preset-item editing">
                  <div className="edit-fields">
                    <input value={editName} onChange={e => setEditName(e.target.value)} placeholder="メニュー名" />
                    <div className="edit-row2">
                      <input value={editPrice} inputMode="numeric" onChange={e => setEditPrice(e.target.value)} placeholder="金額" />
                      <select value={editCategory} onChange={e => setEditCategory(e.target.value)}>
                        {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="edit-actions">
                    <button className="save-btn" onClick={() => saveEdit(p)}>保存</button>
                    <button className="cancel-btn" onClick={cancelEdit}>取消</button>
                  </div>
                </div>
              ) : (
                <div key={p.id} className="preset-item">
                  <div>
                    <div className="pi-name">{p.name}</div>
                    <div className="pi-price">{formatPrice(p.price)}</div>
                  </div>
                  <div className="pi-actions">
                    {p.isDefault
                      ? <span className="sample-tag">サンプル</span>
                      : <>
                          <button className="edit-link" onClick={() => startEdit(p)}>編集</button>
                          <button className="del-link" onClick={() => deletePreset(p)}>削除</button>
                        </>
                    }
                  </div>
                </div>
              )
          ))}
          {deptItems.length === 0 && (
            <div className="empty-state">この部門のメニューはありません</div>
          )}
        </div>

        <div className="new-preset-section">
          <div className="cat-heading">メニューを追加</div>
          <div className="new-preset-row">
            <input
              placeholder="メニュー名"
              value={newName}
              onChange={e => setNewName(e.target.value)}
            />
            <input
              placeholder="金額"
              inputMode="numeric"
              value={newPrice}
              onChange={e => setNewPrice(e.target.value)}
            />
          </div>
          <div className="new-preset-row2">
            <select value={newCategory} onChange={e => setNewCategory(e.target.value)}>
              {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <button onClick={addPreset}>追加</button>
          </div>
        </div>

        <div className="reset-section">
          <button className="reset-btn" onClick={loadDefaultMenu}>初期メニューを読み込む（現在のメニューを置き換え）</button>
          <div className="reset-note">標準メニュー（ボディケア／タイ・バリ）を一括登録します。最新のメニューに置き換えたいときに押してください。</div>
        </div>
      </div>
    );
  }

  // マウント
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
